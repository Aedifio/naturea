# Render Blueprint — https://render.com/docs/blueprint-spec
# Node web service serves the Angular build with SPA fallback (server.mjs).
# Netlify-style public/_redirects is NOT read by Render.
services:
  - type: web
    name: naturea-portal
    runtime: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: node server.mjs
    previews:
      generation: automatic
    buildFilter:
      paths:
        - frontend/**
        - scripts/**
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
