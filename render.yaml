# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: connect this repo in Render Dashboard → New → Blueprint → select render.yaml
services:
  - type: web
    name: naturea-portal
    runtime: static
    rootDir: frontend
    buildCommand: cd .. && node scripts/write-environment.mjs && cd frontend && npm ci && npm run build
    staticPublishPath: dist/frontend/browser
    previews:
      generation: automatic
    buildFilter:
      paths:
        - frontend/**
        - scripts/**
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
