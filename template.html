<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PAGE_TITLE}} — Maisons Naturéa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@87..125,300..900&family=Archivo+Black&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       NATURÉA DESIGN SYSTEM — SHARED ACROSS ALL APPS
       ============================================================ */
    :root {
      /* Fonds — palette crème/naturelle Naturéa */
      --bg: #f7f4ec;
      --surface: #ffffff;
      --surface-alt: #f0ebdf;
      --ink: #1f2e25;
      --muted: #4f5f56;
      --subtle: #8a948c;
      --border: #e3dccc;
      --border-strong: #cfc6b2;

      /* Vert sapin Naturéa officiel #355222 */
      --accent: #355222;
      --accent-soft: #e2e8da;
      --accent-ink: #243919;

      /* Bois / terracotta complémentaire */
      --wood: #d69362;
      --wood-soft: #f7e7d6;
      --wood-ink: #b87648;

      /* Sémantique harmonisée */
      --green: #2f8557;
      --green-soft: #e1f0e8;
      --amber: #c98f37;
      --amber-soft: #f7ecd7;
      --red: #b8453d;
      --red-soft: #f5dedc;

      /* Typo — Archivo (police du logo Naturéa) partout */
      --serif: 'Archivo Black', 'Archivo', sans-serif;
      --sans: 'Archivo', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      font-variant-numeric: tabular-nums;
    }

    button { font-family: var(--sans); cursor: pointer; }
    input, textarea, select { font-family: var(--sans); }
    input:focus, textarea:focus, select:focus {
      outline: 2px solid var(--accent-soft);
      outline-offset: -1px;
    }

    /* Header — sticky nav */
    header {
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .header-inner {
      max-width: 1320px;
      margin: 0 auto;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand-block {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-banner {
      height: 44px;
      width: auto;
      display: block;
      border-radius: 6px;
    }

    .logo-tag {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 800;
      padding-left: 14px;
      border-left: 1px solid var(--border-strong);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Main content */
    main {
      max-width: 1320px;
      margin: 0 auto;
      padding: 28px 24px 80px;
    }

    .page-title {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 28px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .page-title .kicker {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 800;
      margin-bottom: 6px;
    }

    .page-title h1 {
      font-family: var(--serif);
      font-size: 30px;
      font-weight: 900;
      margin: 0;
      letter-spacing: -0.01em;
      line-height: 1.1;
      text-transform: uppercase;
    }

    .page-title .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-top: 6px;
      font-weight: 500;
    }

    /* Buttons */
    .btn {
      border: 1px solid;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 11.5px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      transition: all 150ms ease;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-family: var(--sans);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .btn-primary:hover {
      background: var(--accent-ink);
      border-color: var(--accent-ink);
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--ink);
      border-color: var(--border-strong);
    }

    .btn-secondary:hover {
      background: var(--surface-alt);
    }

    .btn-ghost {
      background: transparent;
      color: var(--ink);
      border-color: transparent;
    }

    .btn-ghost:hover {
      background: var(--surface-alt);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }

    .card-title {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 10.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 800;
      margin-bottom: 14px;
    }

    /* Utilities */
    .hidden { display: none !important; }
    .text-muted { color: var(--muted); }
    .text-subtle { color: var(--subtle); }
    .text-red { color: var(--red); }

    @media (max-width: 640px) {
      .header-inner { padding: 10px 16px; }
      .brand-banner { height: 36px; }
      .logo-tag { display: none; }
      main { padding: 20px 16px 60px; }
    }
  </style>
  {{EXTRA_STYLES}}
</head>

<div id="toast-container"></div>

<script>
  // ============================================================
  // SHARED UTILITIES
  // ============================================================
  const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));

  function toast(msg, type = 'info') {
    const c = document.getElementById('toast-container');
    c.innerHTML = `<div class="toast ${type === 'error' ? 'error' : ''}">${escapeHtml(msg)}</div>`;
    setTimeout(() => { c.innerHTML = ''; }, 3500);
  }

  function openModal(title, content, opts = {}) {
    const wide = opts.wide ? 'wide' : '';
    const c = document.getElementById('modal-container');
    c.innerHTML = `
      <div class="modal-overlay" id="modal-overlay">
        <div class="modal ${wide}">
          <div class="modal-header">
            <h3>${escapeHtml(title)}</h3>
            <button class="icon-btn" id="modal-close-btn">✕</button>
          </div>
          <div class="modal-body" id="modal-body">${content}</div>
        </div>
      </div>
    `;
    document.getElementById('modal-close-btn').onclick = closeModal;
    document.getElementById('modal-overlay').onclick = (e) => {
      if (e.target.id === 'modal-overlay') closeModal();
    };
    if (opts.onMount) opts.onMount();
  }

  function closeModal() {
