function openMemberEditor(member) {
  const colors = ['#a8472c', '#2d5f3f', '#6b4a8b', '#b8860b', '#2c6b8b', '#8b2c2c', '#4a5568', '#c97a4a', '#5d4037', '#1b5e20', '#bf360c', '#4527a0'];
  const m = member || { id: null, name: '', role: '', email: '', color: colors[state.data.members.length % colors.length] };
  let selectedColor = m.color;

  const renderColors = () => colors.map(c => `<button class="color-swatch ${c === selectedColor ? 'selected' : ''}" data-color="${c}" style="background:${c};"></button>`).join('');

  const html = `
    <div class="field">
      <label>Nom complet</label>
      <input type="text" class="input" id="mb-name" value="${escapeHtml(m.name)}" autofocus>
    </div>
    <div class="field">
      <label>Rôle / Fonction</label>
      <input type="text" class="input" id="mb-role" value="${escapeHtml(m.role)}">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" class="input" id="mb-email" value="${escapeHtml(m.email)}">
    </div>
    <div class="field">
      <label>Couleur</label>
      <div class="color-picker" id="mb-colors">${renderColors()}</div>
    </div>
    <div class="flex-end">
      ${m.id ? `<button class="btn btn-danger" id="mb-delete">${icon('trash', 14)}Retirer</button>` : ''}
      <button class="btn btn-ghost" id="mb-cancel">Annuler</button>
      <button class="btn btn-primary" id="mb-save">${icon('save', 14)}Enregistrer</button>
    </div>
  `;

  openModal(member ? 'Modifier le membre' : 'Nouveau membre', html, {
    onMount: () => {
      document.getElementById('mb-colors').onclick = (e) => {
        if (e.target.dataset.color) {
          selectedColor = e.target.dataset.color;
          document.getElementById('mb-colors').innerHTML = renderColors();
        }
      };
      document.getElementById('mb-cancel').onclick = closeModal;
      document.getElementById('mb-save').onclick = () => {
        const name = document.getElementById('mb-name').value.trim();
        if (!name) return;
        const updated = {
          ...m, name,
          role: document.getElementById('mb-role').value,
          email: document.getElementById('mb-email').value,
          color: selectedColor,
        };
        if (m.id) {
          update(d => ({ ...d, members: d.members.map(x => x.id === m.id ? updated : x) }));
        } else {
          update(d => ({ ...d, members: [...d.members, { ...updated, id: uid('m') }] }));
        }
        closeModal();
        toast('Membre enregistré');
      };
      if (m.id) {
        document.getElementById('mb-delete').onclick = () => {
          confirmDialog('Retirer ce membre ? Ses actions seront conservées mais "non attribuées".', () => {
            update(d => ({
              ...d,
              members: d.members.filter(x => x.id !== m.id),
              actions: d.actions.map(a => ({
                ...a,
                ownerId: a.ownerId === m.id ? null : a.ownerId,
                coOwnerIds: (a.coOwnerIds || []).filter(c => c !== m.id),
              })),
            }));
            closeModal();
          });
        };
      }
      document.getElementById('mb-name').focus();
    }
  });
}


// ─── Archives view ────────────────────────────────────────────────
function renderArchives() {
  const data = state.data;
  const archived = data.actions.filter(a => a.archived);
  // Sort by archived date desc
  archived.sort((a, b) => (b.archivedAt || '').localeCompare(a.archivedAt || ''));

  // Group by archive month
  const groups = {};
  for (const a of archived) {
    const key = a.archivedAt ? a.archivedAt.slice(0, 7) : '0000-00';
    if (!groups[key]) groups[key] = [];
    groups[key].push(a);
  }
  const sortedKeys = Object.keys(groups).sort().reverse();

  const formatMonth = (key) => {
    if (key === '0000-00') return 'Sans date';
    const [y, m] = key.split('-');
    const d = new Date(+y, +m - 1, 1);
    return d.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
  };

  document.getElementById('main').innerHTML = `
    <div class="page-title">
      <div>
        <div class="kicker">Archives</div>
        <h1>Tâches archivées</h1>
        <div class="subtitle">${archived.length} tâche${archived.length > 1 ? 's' : ''} archivée${archived.length > 1 ? 's' : ''}</div>
      </div>
    </div>

    ${archived.length === 0 ? `
      <div class="empty-state">
        <div class="icon">${icon('archive', 40)}</div>
        <div class="title">Aucune tâche archivée</div>
        <div class="hint">Les tâches archivées depuis le plan d'action apparaîtront ici. Pour archiver, sélectionnez une ou plusieurs tâches dans le plan d'action puis cliquez sur "Archiver", ou utilisez le bouton "Archiver" dans la fiche d'une tâche.</div>
      </div>
    ` : sortedKeys.map(key => `
      <div class="theme-group">
        <div class="theme-header" style="cursor:default;">
          <div class="theme-header-left">
            <span class="theme-name" style="text-transform:capitalize;">${formatMonth(key)}</span>
          </div>
          <div class="theme-counts">
            <span class="theme-count done">${groups[key].length} tâche${groups[key].length > 1 ? 's' : ''}</span>
          </div>
        </div>
        <div class="theme-actions">
          ${groups[key].map(a => renderActionRow(a)).join('')}
        </div>
      </div>
    `).join('')}
  `;

  document.querySelectorAll('[data-open-action]').forEach(b => {
    b.onclick = () => openActionDetail(b.dataset.openAction);
  });
  document.querySelectorAll('[data-toggle-status]').forEach(b => {
    b.onclick = (e) => {
      e.stopPropagation();
      const id = b.dataset.toggleStatus;
      const a = state.data.actions.find(x => x.id === id);
      const newStatus = a.status === 'done' ? 'todo' : 'done';
      patchAction(id, { status: newStatus }, `Statut changé : ${STATUS_META[newStatus].label}`);
    };
  });
}


// ─── Generate Word document for agenda ──────────────────────────
// Uses Word-compatible HTML (.doc) - opens natively in Microsoft Word, LibreOffice, Google Docs
// No external library required.
function generateAgendaDocx(params, selectedActions, byTheme) {
  const data = state.data;
  const recipients = data.members.filter(m => params.recipientsState && params.recipientsState[m.id]);

  let totalDuration = 0;
  for (const a of selectedActions) totalDuration += params.durationsByTheme[a.id] || 10;

  // Build agenda items HTML, grouped by theme
  let counter = 1;
  const themesHtml = data.themes.filter(t => byTheme[t]).map(theme => {
    const items = byTheme[theme].map(a => {
      const dur = params.durationsByTheme[a.id] || 10;
      const { primary, co } = getActionOwners(a);
      const owners = [primary, ...co].filter(Boolean).map(m => m.name).join(', ');
      const lastComment = (a.comments || []).slice(-1)[0];

      const metaParts = [];
      if (params.includeOwners && owners) metaParts.push(`<strong>Responsable :</strong> ${escapeHtml(owners)}`);
      if (params.includeStatus) {
        metaParts.push(`<strong>Statut :</strong> ${escapeHtml(STATUS_META[a.status].label)}`);
        if (a.deadline) metaParts.push(`<strong>Échéance :</strong> ${escapeHtml(formatDate(a.deadline))}`);
      }

      const html = `
        <p style="margin:14pt 0 4pt 0;">
          <span style="color:#A8472C;font-weight:bold;">${counter++}.</span>
          <strong style="font-size:12pt;">&nbsp;${escapeHtml(a.title)}</strong>
          <span style="color:#6B6B5F;">&nbsp;&nbsp;[${dur} min]</span>
        </p>
        ${metaParts.length ? `<p style="margin:0 0 4pt 24pt;font-size:10pt;color:#444;">${metaParts.join(' &nbsp;·&nbsp; ')}</p>` : ''}
        ${a.description && a.description.trim() ? `<p style="margin:0 0 4pt 24pt;font-size:10pt;">${escapeHtml(a.description)}</p>` : ''}
        ${params.includeComments && lastComment ? `<p style="margin:0 0 4pt 24pt;font-size:10pt;color:#6B6B5F;font-style:italic;">« ${escapeHtml(lastComment.text)} »</p>` : ''}
      `;
      return html;
    }).join('');

    return `
      <h2 style="color:#A8472C;font-size:11pt;letter-spacing:1pt;text-transform:uppercase;border-bottom:1pt solid #E8E1D1;padding-bottom:4pt;margin:24pt 0 8pt 0;">${escapeHtml(theme)}</h2>
      ${items}
    `;
  }).join('');

  const totalH = Math.floor(totalDuration / 60);
  const totalM = totalDuration % 60;
  const totalLabel = totalH > 0 ? `${totalH}h${totalM.toString().padStart(2,'0')}` : `${totalM} min`;

  // Word-compatible HTML. The xmlns and ProgId hints make Windows recognize it as a Word doc.
  const html = `<!DOCTYPE html>
<html xmlns:o="urn:schemas-microsoft-com:office:office"
      xmlns:w="urn:schemas-microsoft-com:office:word"
      xmlns="http://www.w3.org/TR/REC-html40">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>${escapeHtml(params.meetingTitle)}</title>
<!--[if gte mso 9]>
<xml>
<w:WordDocument>
<w:View>Print</w:View>
<w:Zoom>100</w:Zoom>
</w:WordDocument>
</xml>
<![endif]-->
<style>
@page WordSection1 { size: 21cm 29.7cm; margin: 2.5cm 2cm; }
body { font-family: Calibri, Arial, sans-serif; font-size: 11pt; color: #1f2e25; }
div.WordSection1 { page: WordSection1; }
h1 { font-size: 22pt; color: #1f2e25; margin: 0 0 6pt 0; font-weight: normal; }
h2 { font-size: 11pt; }
.kicker { color: #A8472C; font-size: 10pt; letter-spacing: 1.5pt; text-transform: uppercase; font-weight: bold; margin-bottom: 4pt; }
.meta { color: #6B6B5F; font-size: 11pt; margin-bottom: 4pt; }
.meta strong { color: #1f2e25; }
.summary-box { border-top: 1pt solid #D4CCB8; border-bottom: 1pt solid #D4CCB8; padding: 8pt 0; margin: 16pt 0; color: #6B6B5F; font-size: 10pt; }
.summary-box strong { color: #1f2e25; font-size: 11pt; }
.section-label { color: #A8472C; font-size: 10pt; letter-spacing: 1pt; text-transform: uppercase; font-weight: bold; margin-top: 18pt; margin-bottom: 6pt; }
.footer { color: #9A9A8A; font-size: 9pt; font-style: italic; text-align: center; border-top: 1pt solid #E8E1D1; margin-top: 30pt; padding-top: 10pt; }
</style>
</head>
<body>
<div class="WordSection1">

<p class="kicker">Ordre du jour</p>
<h1>${escapeHtml(params.meetingTitle)}</h1>
${(params.meetingDate || params.meetingTime) ? `<p class="meta">${params.meetingDate ? escapeHtml(formatDateLong(params.meetingDate)) : ''}${params.meetingTime ? ' à ' + escapeHtml(params.meetingTime) : ''}</p>` : ''}
${params.meetingLocation ? `<p class="meta"><strong>Lieu :</strong> ${escapeHtml(params.meetingLocation)}</p>` : ''}

${recipients.length > 0 ? `
<p class="section-label">Participants (${recipients.length})</p>
<p style="font-size:11pt;">${recipients.map(m => escapeHtml(m.name)).join(' &nbsp;·&nbsp; ')}</p>
` : ''}

${params.intro && params.intro.trim() ? `
<p class="section-label">Introduction</p>
<p>${escapeHtml(params.intro).replace(/\n/g, '<br>')}</p>
` : ''}

<div class="summary-box">
  <strong>Durée totale prévue : ${totalLabel}</strong>
  &nbsp;·&nbsp; ${selectedActions.length} point${selectedActions.length > 1 ? 's' : ''} à l'ordre du jour
</div>

${themesHtml}

<p class="footer">Document généré le ${escapeHtml(formatDate(todayISO()))} · Codir</p>

</div>
</body>
</html>`;

  // Create blob with Word MIME type. Word and other office suites recognize .doc HTML files.
  const blob = new Blob(['\ufeff' + html], { type: 'application/msword' });

  const safeTitle = (params.meetingTitle || 'codir').replace(/[^a-zA-Z0-9À-ÿ\s-]/g, '').replace(/\s+/g, '-').slice(0, 60);
  const filename = `Ordre-du-jour-${safeTitle}-${todayISO()}.doc`;

  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  setTimeout(() => URL.revokeObjectURL(url), 1000);

  return filename;
}


// ─── Agenda composer ──────────────────────────────────────────────
function openAgendaComposer() {
  const data = state.data;
  const selectedIds = Array.from(state.selectedActionIds);
  const selected = data.actions.filter(a => selectedIds.includes(a.id));
  // Group by theme, ordered like data.themes
  const byTheme = {};
  for (const a of selected) {
    if (!byTheme[a.theme]) byTheme[a.theme] = [];
    byTheme[a.theme].push(a);
  }

  // Default meeting metadata
  const defaultDate = (() => {
    // Next Monday
    const d = new Date();
    const day = d.getDay();
    const offset = day === 0 ? 1 : day === 6 ? 2 : (8 - day);
    d.setDate(d.getDate() + offset);
    return d.toISOString().slice(0, 10);
  })();

  // Default duration per item
  const defaultDuration = 10;

  // Default recipients: all members with email
  const recipientsState = {};
  for (const m of data.members) recipientsState[m.id] = !!m.email;

  const buildAgendaText = (params) => {
    const { meetingTitle, meetingDate, meetingTime, meetingLocation, intro, durationsByTheme, includeOwners, includeStatus, includeComments } = params;
    const lines = [];
    lines.push(`${meetingTitle}`);
    lines.push(`Date : ${formatDateLong(meetingDate)}${meetingTime ? ' à ' + meetingTime : ''}`);
    if (meetingLocation) lines.push(`Lieu : ${meetingLocation}`);
    lines.push('');
    if (intro) { lines.push(intro); lines.push(''); }
    lines.push('ORDRE DU JOUR');
    lines.push('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
    let counter = 1;
    let totalDuration = 0;
    for (const theme of data.themes) {
      if (!byTheme[theme]) continue;
      lines.push('');
      lines.push(`▸ ${theme.toUpperCase()}`);
      for (const a of byTheme[theme]) {
        const dur = durationsByTheme[a.id] || defaultDuration;
        totalDuration += dur;
        const { primary, co } = getActionOwners(a);
        const owners = [primary, ...co].filter(Boolean).map(m => m.name).join(', ');
        let line = `  ${counter}. ${a.title}`;
        line += `  [${dur} min]`;
        lines.push(line);
        if (includeOwners && owners) lines.push(`     Responsable : ${owners}`);
        if (includeStatus) lines.push(`     Statut : ${STATUS_META[a.status].label}${a.deadline ? ' · échéance ' + formatDate(a.deadline) : ''}`);
        if (includeComments) {
          const lastComment = (a.comments || []).slice(-1)[0];
          if (lastComment) lines.push(`     Note : ${lastComment.text}`);
        }
        counter++;
      }
    }
    lines.push('');
    lines.push('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
    lines.push(`Durée totale prévue : ${totalDuration} min (${Math.floor(totalDuration/60)}h${(totalDuration%60).toString().padStart(2,'0')})`);
    return lines.join('\n');
  };

  const renderBody = () => {
    return `
      <div class="agenda-composer">
        <div class="grid-2" style="margin-bottom:14px;">
          <div class="field" style="margin-bottom:0;">
            <label>Titre de la réunion</label>
            <input type="text" class="input" id="ag-title" value="CODIR du ${formatDate(defaultDate)}">
          </div>
          <div class="field" style="margin-bottom:0;">
            <label>Lieu (optionnel)</label>
            <input type="text" class="input" id="ag-location" placeholder="Visio, salle de réunion...">
          </div>
        </div>
        <div class="grid-2" style="margin-bottom:14px;">
          <div class="field" style="margin-bottom:0;">
            <label>Date</label>
            <input type="date" class="input" id="ag-date" value="${defaultDate}">
          </div>
          <div class="field" style="margin-bottom:0;">
            <label>Heure (optionnel)</label>
            <input type="time" class="input" id="ag-time">
          </div>
        </div>
        <div class="field">
          <label>Introduction (optionnel)</label>
          <textarea class="input" id="ag-intro" rows="2" placeholder="Mot d'introduction, objectifs de la réunion..."></textarea>
        </div>

        <div class="detail-section" style="padding-top:14px;">
          <h4>Tâches sélectionnées (${selected.length})</h4>
          <div class="agenda-items-list">
            ${data.themes.filter(t => byTheme[t]).map(theme => `
              <div class="agenda-theme">
                <div class="agenda-theme-name">${escapeHtml(theme)}</div>
                ${byTheme[theme].map((a, i) => `
                  <div class="agenda-item-row">
                    <button class="icon-btn" data-remove-from-agenda="${a.id}" title="Retirer de l'ordre du jour">${icon('x', 14)}</button>
                    <span class="grow truncate">${escapeHtml(a.title)}</span>
                    <input type="number" min="1" max="180" class="duration-input-mini" data-duration="${a.id}" value="${defaultDuration}">
                    <span class="text-muted" style="font-size:11px;">min</span>
                  </div>
                `).join('')}
              </div>
            `).join('')}
          </div>
        </div>

        <div class="detail-section">
          <h4>Options du document</h4>
          <div style="display:flex;flex-wrap:wrap;gap:14px;">
            <label class="checkbox-label"><input type="checkbox" id="opt-owners" checked> Inclure les responsables</label>
            <label class="checkbox-label"><input type="checkbox" id="opt-status" checked> Inclure le statut et l'échéance</label>
            <label class="checkbox-label"><input type="checkbox" id="opt-comments"> Inclure le dernier commentaire</label>
          </div>
        </div>

        <div class="detail-section">
          <h4>Destinataires</h4>
          <div style="display:flex;flex-wrap:wrap;gap:6px;">
            ${data.members.map(m => `
              <button class="chip ${recipientsState[m.id] ? 'active' : ''}" data-toggle-recipient="${m.id}" ${!m.email ? 'disabled style="opacity:0.4;"' : ''} title="${m.email || 'Pas d\u2019email renseigné'}">
                ${escapeHtml(m.name)}${!m.email ? ' (✕)' : ''}
              </button>
            `).join('')}
          </div>
          <div class="field-hint" style="margin-top:8px;">Les membres sans email renseigné ne peuvent être sélectionnés. Allez dans <strong>Équipe</strong> pour les renseigner.</div>
        </div>

        <div class="detail-section">
          <h4>Aperçu du message</h4>
          <textarea class="input" id="ag-preview" rows="14" style="font-family:monospace;font-size:12px;line-height:1.5;background:var(--surface-alt);"></textarea>
          <div class="field-hint" style="margin-top:6px;">Vous pouvez modifier librement le texte avant envoi.</div>
        </div>

        <div class="flex-end" style="padding-top:18px;border-top:1px solid var(--border);">
          <button class="btn btn-ghost" id="ag-cancel">Annuler</button>
          <button class="btn btn-secondary" id="ag-copy">${icon('copy', 14)}Copier</button>
          <button class="btn btn-accent" id="ag-send">${icon('send', 14)}Ouvrir dans le mail</button>
        </div>
      </div>
    `;
  };

  // Track durations and ag local state
  const durations = {};
  for (const a of selected) durations[a.id] = defaultDuration;

  const refreshPreview = () => {
    const params = {
      meetingTitle: document.getElementById('ag-title').value,
      meetingDate: document.getElementById('ag-date').value,
      meetingTime: document.getElementById('ag-time').value,
      meetingLocation: document.getElementById('ag-location').value,
      intro: document.getElementById('ag-intro').value,
      durationsByTheme: durations,
      includeOwners: document.getElementById('opt-owners').checked,
      includeStatus: document.getElementById('opt-status').checked,
      includeComments: document.getElementById('opt-comments').checked,
    };
    document.getElementById('ag-preview').value = buildAgendaText(params);
  };

  openModal('Préparer un ordre du jour', renderBody(), {
    wide: true,
    onMount: () => {
      // Bind input live updates
      ['ag-title','ag-date','ag-time','ag-location','ag-intro','opt-owners','opt-status','opt-comments'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.oninput = el.onchange = refreshPreview;
      });
      document.querySelectorAll('[data-duration]').forEach(el => {
        el.oninput = () => {
          durations[el.dataset.duration] = +el.value || defaultDuration;
          refreshPreview();
        };
      });
      document.querySelectorAll('[data-remove-from-agenda]').forEach(b => {
        b.onclick = () => {
          state.selectedActionIds.delete(b.dataset.removeFromAgenda);
          if (state.selectedActionIds.size === 0) {
            closeModal();
            renderActions();
            return;
          }
          openAgendaComposer();
        };
      });
      document.querySelectorAll('[data-toggle-recipient]').forEach(b => {
        b.onclick = () => {
          const id = b.dataset.toggleRecipient;
          const m = data.members.find(x => x.id === id);
          if (!m.email) return;
          recipientsState[id] = !recipientsState[id];
          b.classList.toggle('active');
        };
      });
      document.getElementById('ag-cancel').onclick = closeModal;
      document.getElementById('ag-copy').onclick = async () => {
        try {
          await navigator.clipboard.writeText(document.getElementById('ag-preview').value);
          toast('Ordre du jour copié dans le presse-papier');
        } catch (e) { toast('Échec de la copie', 'error'); }
      };
      document.getElementById('ag-send').onclick = () => {
        const recipientEmails = data.members
          .filter(m => recipientsState[m.id] && m.email)
          .map(m => m.email).join(',');
        if (!recipientEmails) {
          toast('Aucun destinataire avec email sélectionné', 'error');
          return;
        }
        const subject = document.getElementById('ag-title').value;
        const params = collectAgendaParams();

        try {
          const filename = generateAgendaDocx(params, selected, byTheme);
          // Build a short mail body (the agenda is in the attachment)
          const shortBody = [
            'Bonjour,',
            '',
            `Vous trouverez ci-joint l'ordre du jour pour ${params.meetingTitle}${params.meetingDate ? ' du ' + formatDateLong(params.meetingDate) : ''}${params.meetingTime ? ' à ' + params.meetingTime : ''}.`,
            params.meetingLocation ? `Lieu : ${params.meetingLocation}` : '',
            '',
            params.intro || '',
            '',
            `📎 Pièce jointe : ${filename}`,
            '(le fichier vient d\u2019\u00eatre t\u00e9l\u00e9charg\u00e9 sur votre ordinateur — glissez-le dans le mail avant l\u2019envoi)',
            '',
            'Cordialement.',
          ].filter(l => l !== null).join('\n');
          const mailto = `mailto:${recipientEmails}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(shortBody)}`;
          // Small delay so the download starts before the mail client opens
          setTimeout(() => { window.location.href = mailto; }, 400);
          toast('Document Word téléchargé. Glissez-le dans le mail qui s\u2019ouvre.');
        } catch (e) {
          console.error('Erreur génération document:', e);
          toast('Erreur : ' + (e.message || e.toString()).slice(0, 100), 'error');
          alert('Détail de l\'erreur (à me communiquer si elle persiste) :\n\n' + (e.stack || e.message || e.toString()));
        }
      };

      // Helper to collect current params (used by both preview and send)
      function collectAgendaParams() {
        return {
          meetingTitle: document.getElementById('ag-title').value,
          meetingDate: document.getElementById('ag-date').value,
          meetingTime: document.getElementById('ag-time').value,
          meetingLocation: document.getElementById('ag-location').value,
          intro: document.getElementById('ag-intro').value,
          durationsByTheme: durations,
          includeOwners: document.getElementById('opt-owners').checked,
          includeStatus: document.getElementById('opt-status').checked,
          includeComments: document.getElementById('opt-comments').checked,
          recipientsState: { ...recipientsState },
        };
      }
      refreshPreview();
    }
  });
}

// ─── Render ───────────────────────────────────────────────────────
function render() {
  renderNav();
  if (state.view === 'dashboard') renderDashboard();
  else if (state.view === 'actions') renderActions();
  else if (state.view === 'archives') renderArchives();
  else if (state.view === 'team') renderTeam();
}

// ─── Init ─────────────────────────────────────────────────────────
state.data = loadData();
state.currentUserId = loadCurrentUser();

document.getElementById('reset-btn').onclick = () => {
  confirmDialog('Réinitialiser avec les données importées de votre Excel ?', () => {
    localStorage.removeItem(STORAGE_KEY);
    state.data = loadData();
    state.view = 'dashboard';
    render();
    toast('Données réinitialisées');
  });
};
render();
</script>
