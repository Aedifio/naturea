<!DOCTYPE html>
<html lang="fr">
<head>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Black&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codir — Pilotage exécutif</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@87..125,300..900&family=Archivo+Black&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    /* Fonds — palette crème/naturelle Naturéa */
    --bg: #f7f4ec; --surface: #ffffff; --surface-alt: #f0ebdf;
    --ink: #1f2e25; --muted: #4f5f56; --subtle: #8a948c;
    --border: #e3dccc; --border-strong: #cfc6b2;
    /* Accent = vert sapin Naturéa officiel #355222 */
    --accent: #355222; --accent-soft: #e2e8da; --accent-ink: #243919;
    /* Bois / terracotta complémentaire (couleur du toit du logo) */
    --wood: #d69362; --wood-soft: #f7e7d6; --wood-ink: #b87648;
    /* Sémantique harmonisée */
    --green: #2f8557; --green-soft: #e1f0e8;
    --amber: #c98f37; --amber-soft: #f7ecd7;
    --red: #b8453d; --red-soft: #f5dedc;
    /* Typo — Archivo (police du logo Naturéa) partout */
    --serif: 'Archivo Black', 'Archivo', sans-serif;
    --sans: 'Archivo', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  body { font-variant-numeric: tabular-nums; }
  button { font-family: var(--sans); cursor: pointer; }
  input, textarea, select { font-family: var(--sans); }
  input:focus, textarea:focus, select:focus { outline: 2px solid var(--accent-soft); outline-offset: -1px; }

  header { border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 20; }
  .header-inner { max-width: 1320px; margin: 0 auto; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .brand-block { display: flex; align-items: center; gap: 14px; min-width: 0; }
  .brand-banner { height: 44px; width: auto; display: block; border-radius: 6px; }
  .logo-tag { font-size: 10px; color: var(--muted); letter-spacing: 0.16em; text-transform: uppercase; font-weight: 800; padding-left: 14px; border-left: 1px solid var(--border-strong); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .header-alert { display: flex; align-items: center; gap: 6px; background: none; border: none; color: var(--red); font-size: 12px; font-weight: 600; }
  .reset-btn { background: none; border: none; color: var(--subtle); font-size: 12px; font-weight: 500; }
  nav.tabs { max-width: 1320px; margin: 0 auto; padding: 0 24px; display: flex; gap: 4px; overflow-x: auto; }
  nav.tabs button { padding: 10px 14px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-size: 12.5px; font-weight: 600; display: flex; align-items: center; gap: 8px; white-space: nowrap; transition: all 150ms ease; text-transform: uppercase; letter-spacing: 0.05em; }
  nav.tabs button.active { border-bottom-color: var(--accent); color: var(--ink); font-weight: 800; }
  nav.tabs button .badge { background: var(--red); color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 700; font-variant-numeric: tabular-nums; }
  nav.tabs button .badge.amber { background: var(--amber); }

  @media (max-width: 640px) {
    .header-inner { padding: 10px 16px; }
    .brand-banner { height: 36px; }
    .logo-tag { display: none; }
    nav.tabs { padding: 0 12px; }
  }

  main { max-width: 1320px; margin: 0 auto; padding: 28px 24px 80px; }

  .page-title { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 28px; gap: 16px; flex-wrap: wrap; }
  .page-title .kicker { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); font-weight: 800; margin-bottom: 6px; }
  .page-title h1 { font-family: var(--serif); font-size: 30px; font-weight: 900; margin: 0; letter-spacing: -0.01em; line-height: 1.1; text-transform: uppercase; }
  .page-title .subtitle { font-size: 14px; color: var(--muted); margin-top: 6px; font-weight: 500; }
  .page-title-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .btn { border: 1px solid; padding: 10px 16px; border-radius: 6px; font-size: 11.5px; font-weight: 700; display: inline-flex; align-items: center; gap: 8px; white-space: nowrap; transition: all 150ms ease; text-transform: uppercase; letter-spacing: 0.05em; font-family: var(--sans); }
  .btn-sm { padding: 6px 12px; font-size: 11px; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-ink); border-color: var(--accent-ink); }
  .btn-secondary { background: var(--surface); color: var(--ink); border-color: var(--border-strong); }
  .btn-secondary:hover { background: var(--surface-alt); }
  .btn-accent { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-accent:hover { background: var(--accent-ink); }
  .btn-ghost { background: transparent; color: var(--ink); border-color: transparent; }
  .btn-ghost:hover { background: var(--surface-alt); }
  .btn-danger { background: transparent; color: var(--red); border-color: var(--red); }
  .btn-danger:hover { background: var(--red-soft); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .icon-btn { background: none; border: none; color: var(--muted); padding: 6px; border-radius: 4px; display: inline-flex; }
  .icon-btn:hover { background: var(--surface-alt); }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
  .card.accent-red { border-top: 3px solid var(--red); }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .card-title { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 800; }

  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
  .stat-label { font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); font-weight: 800; margin-bottom: 10px; }
  .stat-value { font-family: var(--serif); font-size: 36px; font-weight: 900; line-height: 1; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .stat-value.red { color: var(--red); }
  .stat-value.amber { color: var(--amber); }
  .stat-value.green { color: var(--green); }
  .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }

  .avatar { border-radius: 50%; color: #fff; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; letter-spacing: 0.02em; flex-shrink: 0; }
  .avatar-stack { display: inline-flex; }
  .avatar-stack .avatar:not(:first-child) { margin-left: -6px; border: 2px solid var(--surface); }

  .status-badge { padding: 3px 10px; border-radius: 4px; font-size: 10.5px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
  .status-badge .dot { width: 6px; height: 6px; border-radius: 50%; }
  .status-todo { background: var(--surface-alt); color: var(--ink); }
  .status-todo .dot { background: var(--subtle); }
  .status-in_progress { background: var(--amber-soft); color: #8a5e1a; }
  .status-in_progress .dot { background: var(--amber); }
  .status-done { background: var(--green-soft); color: var(--green); }
  .status-done .dot { background: var(--green); }
  .status-blocked { background: var(--red-soft); color: var(--red); }
  .status-blocked .dot { background: var(--red); }

  .chip { background: var(--surface-alt); color: var(--ink); border: 1px solid var(--border); padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; transition: all 150ms ease; }
  .chip.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 20px; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }
  .search-input { position: relative; flex: 1 1 200px; max-width: 260px; }
  .search-input svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--subtle); }
  .search-input input { width: 100%; padding: 8px 12px 8px 32px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; color: var(--ink); background: var(--surface); }

  .input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; color: var(--ink); background: var(--surface); }
  textarea.input { resize: vertical; }
  .field { display: block; margin-bottom: 16px; }
  .field label { font-size: 10.5px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; display: block; }
  .field-hint { font-size: 12px; color: var(--subtle); margin-top: 4px; }

  /* Theme groups */
  .theme-group { margin-bottom: 20px; }
  .theme-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--surface-alt); border-radius: 8px 8px 0 0; border: 1px solid var(--border); border-bottom: none; cursor: pointer; user-select: none; }
  .theme-header:hover { background: #e6dfc5; }
  .theme-header-left { display: flex; align-items: center; gap: 10px; }
  .theme-name { font-family: var(--serif); font-size: 16px; font-weight: 800; color: var(--ink); text-transform: uppercase; letter-spacing: 0.02em; }
  .theme-counts { display: flex; gap: 6px; }
  .theme-count { font-size: 10.5px; padding: 2px 8px; border-radius: 10px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .theme-count.todo { background: #fff; color: var(--muted); }
  .theme-count.progress { background: var(--amber-soft); color: #8a5e1a; }
  .theme-count.done { background: var(--green-soft); color: var(--green); }
  .theme-count.overdue { background: var(--red-soft); color: var(--red); }
  .theme-toggle { font-size: 18px; color: var(--muted); transition: transform 200ms; }
  .theme-toggle.collapsed { transform: rotate(-90deg); }
  .theme-actions { background: var(--surface); border: 1px solid var(--border); border-radius: 0 0 8px 8px; overflow: hidden; }
  .theme-actions.collapsed { display: none; }

  .action-row { display: grid; grid-template-columns: auto 1fr auto auto auto auto; gap: 14px; padding: 12px 18px; align-items: center; border-top: 1px solid var(--border); cursor: pointer; transition: background 100ms; }
  .action-row:hover { background: var(--surface-alt); }
  .action-row.done { opacity: 0.65; }
  .action-row.done .action-title { text-decoration: line-through; }
  .action-checkbox { width: 22px; height: 22px; border-radius: 4px; border: 1.5px solid var(--border-strong); background: transparent; display: flex; align-items: center; justify-content: center; padding: 0; }
  .action-checkbox.checked { background: var(--green); border-color: var(--green); }
  .action-title { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
  .action-meta { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--muted); flex-wrap: wrap; }
  .comment-bubble { display: inline-flex; align-items: center; gap: 4px; padding: 2px 7px; background: var(--surface-alt); border-radius: 10px; font-size: 11px; color: var(--muted); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(20,20,20,0.45); z-index: 50; display: flex; align-items: flex-start; justify-content: center; padding: 5vh 16px; overflow-y: auto; }
  .modal { background: var(--surface); border-radius: 10px; width: 100%; max-width: 520px; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(20,20,20,0.18); }
  .modal.wide { max-width: 760px; }
  .modal-header { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-header h3 { font-family: var(--serif); font-size: 18px; font-weight: 800; margin: 0; text-transform: uppercase; letter-spacing: 0.01em; }
  .modal-body { padding: 22px; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); border: 1px dashed var(--border-strong); border-radius: 10px; background: var(--surface); }
  .empty-state .icon { color: var(--subtle); margin-bottom: 14px; }
  .empty-state .title { font-family: var(--serif); font-size: 16px; font-weight: 800; color: var(--ink); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.02em; }
  .empty-state .hint { font-size: 13px; margin-bottom: 16px; }

  .section-label { font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); font-weight: 800; margin-bottom: 12px; }

  /* Action detail modal sections */
  .detail-section { padding: 18px 0; border-top: 1px solid var(--border); }
  .detail-section:first-child { border-top: none; padding-top: 0; }
  .detail-section h4 { font-family: var(--sans); font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); font-weight: 800; margin: 0 0 12px; }

  /* Comments */
  .comment { padding: 12px; background: var(--surface-alt); border-radius: 8px; margin-bottom: 10px; }
  .comment-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; gap: 8px; }
  .comment-author { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; }
  .comment-date { font-size: 11px; color: var(--subtle); }
  .comment-text { font-size: 13px; line-height: 1.55; white-space: pre-wrap; }
  .comment-imported { background: #f3eeda; border: 1px dashed var(--border-strong); }
  .comment-imported .comment-text { font-style: italic; color: var(--muted); }

  /* History */
  .history-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; font-size: 12px; }
  .history-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); margin-top: 5px; flex-shrink: 0; }
  .history-text { flex: 1; }
  .history-date { color: var(--subtle); font-size: 11px; }

  /* Subtasks */
  .subtask { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-top: 1px solid var(--border); }
  .subtask:first-child { border-top: none; }
  .subtask-text { flex: 1; font-size: 13px; }
  .subtask-text.done { text-decoration: line-through; color: var(--muted); }

  /* Toast */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--ink); color: #fff; padding: 12px 18px; border-radius: 8px; font-size: 13px; box-shadow: 0 8px 24px rgba(0,0,0,0.25); z-index: 100; font-weight: 500; animation: toastIn 0.2s ease; }
  .toast.error { background: var(--red); }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }

  .info-banner { background: var(--amber-soft); color: #8a5e1a; padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 24px; display: flex; align-items: flex-start; gap: 10px; line-height: 1.5; }

  /* Team grid */
  .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
  .team-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; display: flex; align-items: center; gap: 14px; }
  .color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-swatch { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; }
  .color-swatch.selected { border: 3px solid var(--ink); }

  .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .text-muted { color: var(--muted); }
  .text-subtle { color: var(--subtle); }
  .text-red { color: var(--red); }
  .text-amber { color: var(--amber); }
  .text-green { color: var(--green); }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .flex-between { display: flex; justify-content: space-between; align-items: center; }
  .flex-end { display: flex; justify-content: flex-end; gap: 8px; }
  .grow { flex: 1; min-width: 0; }
  .hidden { display: none !important; }
  .mt-12 { margin-top: 12px; }
  .mb-16 { margin-bottom: 16px; }
  .mb-24 { margin-bottom: 24px; }

  @media (max-width: 640px) {
    .action-row { grid-template-columns: auto 1fr auto; }
    .action-row .hide-mobile { display: none; }
  }

  /* Selection */
  .select-checkbox { width: 22px; height: 22px; background: transparent; border: none; padding: 0; color: var(--subtle); display: flex; align-items: center; justify-content: center; }
  .select-checkbox:hover { color: var(--accent); }
  .select-checkbox.checked { color: var(--accent); }
  .action-row.selected { background: var(--accent-soft); }
  .action-row.selected:hover { background: var(--accent-soft); }

  .selection-bar {
    position: sticky; top: 90px; z-index: 15;
    background: var(--ink); color: var(--bg);
    padding: 12px 18px; border-radius: 10px;
    margin-bottom: 18px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap;
    box-shadow: 0 4px 16px rgba(20,20,20,0.15);
    animation: slideDown 200ms ease;
  }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .selection-info { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .selection-info strong { font-size: 16px; }
  .selection-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .selection-bar .btn-ghost { color: var(--bg); }
  .selection-bar .btn-ghost:hover { background: rgba(255,255,255,0.1); }
  .selection-bar .btn-secondary { background: rgba(255,255,255,0.1); color: var(--bg); border-color: rgba(255,255,255,0.2); }
  .selection-bar .btn-secondary:hover { background: rgba(255,255,255,0.2); }

  /* Action row layout: add selection column */
  .action-row { grid-template-columns: auto auto 1fr auto auto auto !important; }
  @media (max-width: 640px) {
    .action-row { grid-template-columns: auto auto 1fr auto !important; }
  }

  /* Agenda composer */
  .agenda-items-list { background: var(--surface-alt); border-radius: 8px; padding: 12px; }
  .agenda-theme { margin-bottom: 12px; }
  .agenda-theme:last-child { margin-bottom: 0; }
  .agenda-theme-name { font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); font-weight: 800; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
  .agenda-item-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 13px; }
  .duration-input-mini { width: 50px; padding: 4px 6px; border: 1px solid var(--border); border-radius: 4px; font-size: 12px; text-align: right; }
  .checkbox-label { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; }
  .checkbox-label input { cursor: pointer; }


/* ============================================================
   CHARTE GRAPHIQUE NATURÉA — source : Plaquette commerciale V10
   Vert du logo #41532A (accent principal) · Terracotta #D69362 (secondaire)
   Police Archivo (substitut de Gopher)
   ============================================================ */
:root{
  /* Fonds & neutres */
  --bg:#FBFAF5!important; --paper:#FBFAF5!important; --paper2:#FFFFFF!important;
  --surface:#FFFFFF!important; --white:#FFFFFF!important; --card:#FFFFFF!important; --bg4:#FFFFFF!important;
  --surface-alt:#F2EDE3!important; --cream:#F2EDE3!important; --sand:#F2EDE3!important; --sand2:#E9E1D1!important;
  --mist:#F6F2E9!important; --faint:#F6F2E9!important; --bg2:#F2EDE3!important; --bg3:#E9E1D1!important;
  --ink:#1E2A18!important; --text:#1E2A18!important; --ink2:#2E3A26!important; --ink3:#46503C!important;
  --text2:#46503C!important; --text3:#5E6B4F!important; --ink-soft:#46503C!important; --ink-mute:#9BA889!important;
  --muted:#5E6B4F!important; --subtle:#9BA889!important;
  --border:#E2DCCD!important; --border2:#EDE7DA!important; --border-strong:#D8D0BC!important;
  --line:#E2DCCD!important; --line2:#EDE7DA!important;
  /* Accent PRINCIPAL = VERT DU LOGO #41532A (toutes les variantes "primaire") */
  --accent:#41532A!important; --accent-soft:#EAEFE0!important; --accent-ink:#38471F!important;
  --primary:#41532A!important; --primary-l:#556B36!important; --primary-d:#38471F!important; --primary-soft:#EAEFE0!important;
  --forest:#41532A!important; --forest2:#38471F!important;
  --gold:#41532A!important; --gold2:#38471F!important; --gold3:#EAEFE0!important;
  --blue:#41532A!important; --blue-dark:#38471F!important; --blue-light:#EAEFE0!important;
  --clay:#41532A!important; --clay-d:#38471F!important; --clay-soft:#EAEFE0!important;
  --green:#41532A!important; --green-soft:#EAEFE0!important; --ok:#41532A!important;
  /* Accent SECONDAIRE = ORANGE DU LOGO #D69362 */
  --wood:#D69362!important; --wood-soft:#F6E7D7!important; --wood-ink:#B87648!important;
  --wood-l:#E2A982!important; --wood-d:#B87648!important;
  --orange:#D69362!important; --orange-dark:#B87648!important;
  --terra:#D69362!important; --terra2:#B87648!important;
  --petrol:#D69362!important; --petrol-soft:#F6E7D7!important;
  --purple:#D69362!important;
  /* Olive / sauge (tertiaire) */
  --sage:#839049!important; --sage2:#6B7A3A!important; --yellow:#C68B2C!important;
  /* Sémantique */

const formatDateShort = (iso) => {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
};
const daysUntil = (iso) => {
  if (!iso) return null;
  const t = new Date(todayISO()).getTime();
  const d = new Date(iso).getTime();
  return Math.round((d - t) / 86400000);
};
const initials = (name) => name.split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();

function avatar(member, size = 32) {
  if (!member) return `<div class="avatar" style="width:${size}px;height:${size}px;background:#ccc;font-size:${size*0.38}px;">?</div>`;
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:${member.color};font-size:${size*0.38}px;" title="${escapeHtml(member.name)} · ${escapeHtml(member.role)}">${initials(member.name)}</div>`;
}
function avatarStack(members, size = 28, max = 5) {
  if (!members.length) return '';
  return `<div class="avatar-stack">${members.slice(0, max).map(m => avatar(m, size)).join('')}${members.length > max ? `<div class="avatar" style="width:${size}px;height:${size}px;background:var(--surface-alt);color:var(--muted);font-size:${size*0.35}px;border:2px solid var(--surface);">+${members.length-max}</div>` : ''}</div>`;
}

// ─── State ────────────────────────────────────────────────────────
let state = {
  data: null,
  view: 'dashboard',
  collapsedThemes: {},
  filters: { theme: 'all', status: 'all', owner: 'all', search: '' },
  currentUserId: null,
  selectedActionIds: new Set(),
};

function loadData() {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      const parsed = JSON.parse(stored);
      parsed.actions = parsed.actions.map(a => ({ archived: false, archivedAt: null, subtasks: [], ...a }));
      return parsed;
    }
  } catch (e) {}
  const fresh = JSON.parse(JSON.stringify(SEED_DATA));
  fresh.actions = fresh.actions.map(a => ({
    subtasks: [], archived: false, archivedAt: null,
    ...a,
  }));
  saveData(fresh);
  return fresh;
}
function saveData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
  catch (e) {
    if (e.name === 'QuotaExceededError') toast('Stockage plein', 'error');
    else console.error(e);
  }
}
function loadCurrentUser() {
  return localStorage.getItem(CURRENT_USER_KEY);
}
function saveCurrentUser(id) {
  if (id) localStorage.setItem(CURRENT_USER_KEY, id);
  else localStorage.removeItem(CURRENT_USER_KEY);
}

function update(updater) {
  state.data = typeof updater === 'function' ? updater(state.data) : updater;
  saveData(state.data);
  render();
}

function toast(msg, type = 'info') {
  const c = document.getElementById('toast-container');
  c.innerHTML = `<div class="toast ${type === 'error' ? 'error' : ''}">${escapeHtml(msg)}</div>`;
  setTimeout(() => { c.innerHTML = ''; }, 3500);
}

// ─── Modal ────────────────────────────────────────────────────────
function openModal(title, content, opts = {}) {
  const wide = opts.wide ? 'wide' : '';
  const c = document.getElementById('modal-container');
  c.innerHTML = `
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal ${wide}">
        <div class="modal-header">
          <h3>${escapeHtml(title)}</h3>
          <button class="icon-btn" id="modal-close-btn">${icon('x', 20)}</button>
        </div>
        <div class="modal-body" id="modal-body">${content}</div>
      </div>
    </div>
  `;
  document.getElementById('modal-close-btn').onclick = closeModal;
  document.getElementById('modal-overlay').onclick = (e) => {
    if (e.target.id === 'modal-overlay') closeModal();
  };
  if (opts.onMount) opts.onMount();
}
function closeModal() {
  document.getElementById('modal-container').innerHTML = '';
}
function confirmDialog(message, onConfirm) {
  if (confirm(message)) onConfirm();
}

// ─── Action helpers ───────────────────────────────────────────────
function getActionOwners(action) {
  const data = state.data;
  const primary = action.ownerId ? data.members.find(m => m.id === action.ownerId) : null;
  const co = (action.coOwnerIds || []).map(id => data.members.find(m => m.id === id)).filter(Boolean);
  return { primary, co, all: primary ? [primary, ...co] : co };
}

function addHistoryEntry(action, text) {
  return {
    ...action,
    history: [...(action.history || []), { date: nowISO(), action: text, userId: state.currentUserId }],
  };
}

function patchAction(id, patch, historyText) {
  update(d => ({
    ...d,
    actions: d.actions.map(a => {
      if (a.id !== id) return a;
      let updated = { ...a, ...patch };
      if (historyText) updated = addHistoryEntry(updated, historyText);
      return updated;
    }),
  }));
}

// ─── Excel export ─────────────────────────────────────────────────
function exportToExcel() {
  if (typeof XLSX === 'undefined') { toast('Bibliothèque Excel indisponible', 'error'); return; }
  const data = state.data;
  const rows = data.actions.map(a => {
    const { primary, co } = getActionOwners(a);
    const ownerNames = [primary, ...co].filter(Boolean).map(m => m.name).join(', ');
    const dU = daysUntil(a.deadline);
    const lastComment = (a.comments || []).slice(-1)[0];
    return {
      'Thème': a.theme,
      'Date démarrage': a.startDate || '',
      'Tâche': a.title,
      'Responsable(s)': ownerNames || a.ownerLabel || '',
      'Échéance': a.deadline || a.deadlineNote || '',
      'Statut': STATUS_META[a.status].label,
      'Priorité': PRIORITY_LABEL[a.priority],
      'Retard (j)': a.status !== 'done' && dU !== null && dU < 0 ? Math.abs(dU) : 0,
      'Nb commentaires': (a.comments || []).length,
      'Dernier commentaire': lastComment ? lastComment.text : '',
      'Date dernier commentaire': lastComment ? lastComment.createdAt.slice(0, 10) : '',
    };
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = Object.keys(rows[0] || {}).map(k => ({ wch: Math.max(k.length, ...rows.map(r => String(r[k] || '').length)) + 2 }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Plan d'action");
  XLSX.writeFile(wb, `plan-action-codir-${todayISO()}.xlsx`);
  toast(`Excel exporté (${rows.length} actions)`);
}

// ─── Navigation ───────────────────────────────────────────────────
function renderNav() {
  const overdueCount = state.data.actions.filter(a => a.status !== 'done' && daysUntil(a.deadline) < 0).length;
  const archivedCount = state.data.actions.filter(a => a.archived).length;
  const NAV = [
    { id: 'dashboard', label: 'Tableau de bord', iconName: 'layout' },
    { id: 'actions', label: "Plan d'action", iconName: 'list', badge: overdueCount },
    { id: 'archives', label: 'Archives', iconName: 'archive', count: archivedCount },
    { id: 'team', label: 'Équipe', iconName: 'users' },
  ];
  const nav = document.getElementById('main-nav');
  nav.innerHTML = NAV.map(n => `
    <button data-view="${n.id}" class="${state.view === n.id ? 'active' : ''}">
      ${icon(n.iconName, 15)} ${escapeHtml(n.label)}
      ${n.badge > 0 ? `<span class="badge">${n.badge}</span>` : ''}
      ${n.count > 0 ? `<span class="badge" style="background:var(--subtle);">${n.count}</span>` : ''}
    </button>
  `).join('');
  nav.querySelectorAll('button').forEach(b => {
    b.onclick = () => { state.view = b.dataset.view; render(); };
  });
  const alert = document.getElementById('header-alert');
  if (overdueCount > 0) {
    alert.classList.remove('hidden');
    document.getElementById('header-alert-text').textContent = `${overdueCount} en retard`;
    alert.onclick = () => { state.view = 'actions'; state.filters.status = 'overdue'; render(); };
  } else alert.classList.add('hidden');
}

        ${overdue.length === 0 ? `

// ─── Actions view ─────────────────────────────────────────────────
function renderActions() {
  const data = state.data;
  const f = state.filters;

  const filtered = data.actions
    .filter(a => !a.archived)
    .filter(a => f.theme === 'all' ? true : a.theme === f.theme)
    .filter(a => {
      if (f.status === 'all') return true;
      if (f.status === 'overdue') return a.status !== 'done' && daysUntil(a.deadline) < 0;
      return a.status === f.status;
    })
    .filter(a => {
      if (f.owner === 'all') return true;
      return a.ownerId === f.owner || (a.coOwnerIds || []).includes(f.owner);
    })
    .filter(a => {
      if (!f.search) return true;
      const s = f.search.toLowerCase();
      return a.title.toLowerCase().includes(s) ||
             (a.description || '').toLowerCase().includes(s) ||
             (a.comments || []).some(c => c.text.toLowerCase().includes(s));
    });

  // Group by theme
  const byTheme = {};
  for (const t of data.themes) byTheme[t] = [];
  for (const a of filtered) {
    if (!byTheme[a.theme]) byTheme[a.theme] = [];
    byTheme[a.theme].push(a);
  }
  // Sort within theme by deadline
  for (const t in byTheme) {
    byTheme[t].sort((a, b) => (a.deadline || 'z').localeCompare(b.deadline || 'z'));
  }

  document.getElementById('main').innerHTML = `
    <div class="page-title">
      <div>
        <div class="kicker">Plan d'action</div>
        <h1>Suivi des actions</h1>
        <div class="subtitle">${filtered.length} action${filtered.length > 1 ? 's' : ''} · ${data.themes.length} thèmes</div>
      </div>
      <div class="page-title-actions">
        <button class="btn btn-secondary" id="export-excel-btn">${icon('fileSpreadsheet', 14)}Excel</button>
        <button class="btn btn-accent" id="new-action-btn">${icon('plus', 16)}Nouvelle action</button>
      </div>
    </div>

    <div class="filters">
      <div class="search-input">
        ${icon('search', 14)}
        <input type="text" placeholder="Rechercher dans titres et commentaires…" id="search-input" value="${escapeHtml(f.search)}">
      </div>
      <select id="theme-filter" class="input" style="width:auto;font-size:13px;padding:6px 10px;">
        <option value="all">Tous les thèmes</option>
        ${data.themes.map(t => `<option value="${escapeHtml(t)}" ${f.theme === t ? 'selected' : ''}>${escapeHtml(t)}</option>`).join('')}
      </select>
      <select id="owner-filter" class="input" style="width:auto;font-size:13px;padding:6px 10px;">
        <option value="all">Tous les responsables</option>
        ${data.members.map(m => `<option value="${m.id}" ${f.owner === m.id ? 'selected' : ''}>${escapeHtml(m.name)}</option>`).join('')}
      </select>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        ${[['all','Tous'],['overdue','En retard'],['todo','À faire'],['in_progress','En cours'],['done','Terminé']].map(([k,l]) =>
          `<button class="chip ${f.status === k ? 'active' : ''}" data-filter-status="${k}">${l}</button>`
        ).join('')}
      </div>
    </div>

    ${state.selectedActionIds.size > 0 ? `
      <div class="selection-bar">
        <div class="selection-info">
          ${icon('squareCheck', 16)}
          <strong>${state.selectedActionIds.size}</strong> tâche${state.selectedActionIds.size > 1 ? 's' : ''} sélectionnée${state.selectedActionIds.size > 1 ? 's' : ''}
        </div>
        <div class="selection-actions">
          <button class="btn btn-ghost btn-sm" id="select-clear">Tout désélectionner</button>
          <button class="btn btn-secondary btn-sm" id="select-archive-bulk">${icon('archive', 14)}Archiver</button>
          <button class="btn btn-accent btn-sm" id="select-agenda">${icon('mail', 14)}Préparer l'ordre du jour</button>
        </div>
      </div>
    ` : ''}

    ${filtered.length === 0 ? `
      <div class="empty-state">
        <div class="icon">${icon('list', 40)}</div>
        <div class="title">Aucune action ne correspond aux filtres</div>
        <div class="hint">Modifiez vos filtres ou créez une nouvelle action.</div>
      </div>
    ` : data.themes.filter(t => byTheme[t] && byTheme[t].length > 0).map(theme => renderThemeGroup(theme, byTheme[theme])).join('')}
  `;

  // Bindings
  document.getElementById('search-input').oninput = (e) => { state.filters.search = e.target.value; renderActions(); };
  document.getElementById('theme-filter').onchange = (e) => { state.filters.theme = e.target.value; renderActions(); };
  document.getElementById('owner-filter').onchange = (e) => { state.filters.owner = e.target.value; renderActions(); };
  document.querySelectorAll('[data-filter-status]').forEach(b => {
    b.onclick = () => { state.filters.status = b.dataset.filterStatus; renderActions(); };
  });
  document.getElementById('export-excel-btn').onclick = exportToExcel;
  document.getElementById('new-action-btn').onclick = () => openNewActionModal();
  document.querySelectorAll('[data-toggle-theme]').forEach(h => {
    h.onclick = () => {
      const t = h.dataset.toggleTheme;
      state.collapsedThemes[t] = !state.collapsedThemes[t];
      renderActions();
    };
  });
  document.querySelectorAll('[data-toggle-status]').forEach(b => {
    b.onclick = (e) => {
      e.stopPropagation();
      const id = b.dataset.toggleStatus;
      const a = state.data.actions.find(x => x.id === id);
      const newStatus = a.status === 'done' ? 'todo' : 'done';
      patchAction(id, { status: newStatus }, `Statut changé : ${STATUS_META[newStatus].label}`);
    };
  });
  document.querySelectorAll('[data-toggle-select]').forEach(b => {
    b.onclick = (e) => {
      e.stopPropagation();
      const id = b.dataset.toggleSelect;
      if (state.selectedActionIds.has(id)) state.selectedActionIds.delete(id);
      else state.selectedActionIds.add(id);
      renderActions();
    };
  });
  document.getElementById('select-clear')?.addEventListener('click', () => {
    state.selectedActionIds.clear();
    renderActions();
  });
  document.getElementById('select-archive-bulk')?.addEventListener('click', () => {
    const ids = Array.from(state.selectedActionIds);
    confirmDialog(`Archiver ${ids.length} tâche${ids.length > 1 ? 's' : ''} ?`, () => {
      const now = nowISO();
      update(d => ({
        ...d,
        actions: d.actions.map(a => ids.includes(a.id) ? {
          ...a, archived: true, archivedAt: now,
          history: [...(a.history || []), { date: now, action: 'Tâche archivée', userId: state.currentUserId }],
        } : a),
      }));
      state.selectedActionIds.clear();
      toast(`${ids.length} tâche${ids.length > 1 ? 's' : ''} archivée${ids.length > 1 ? 's' : ''}`);
    });
  });
  document.getElementById('select-agenda')?.addEventListener('click', () => openAgendaComposer());
  document.querySelectorAll('[data-open-action]').forEach(b => {
    b.onclick = () => openActionDetail(b.dataset.openAction);
  });
}

function renderThemeGroup(theme, actions) {
  const collapsed = state.collapsedThemes[theme];
  const counts = {
    todo: actions.filter(a => a.status === 'todo').length,
    progress: actions.filter(a => a.status === 'in_progress').length,
    done: actions.filter(a => a.status === 'done').length,
    overdue: actions.filter(a => a.status !== 'done' && daysUntil(a.deadline) < 0).length,
  };
  return `
    <div class="theme-group">
      <div class="theme-header" data-toggle-theme="${escapeHtml(theme)}">
        <div class="theme-header-left">
          <span class="theme-toggle ${collapsed ? 'collapsed' : ''}">${icon('chevronDown', 18)}</span>
          <span class="theme-name">${escapeHtml(theme)}</span>
        </div>
        <div class="theme-counts">
          ${counts.overdue > 0 ? `<span class="theme-count overdue">${counts.overdue} retard</span>` : ''}
          ${counts.todo > 0 ? `<span class="theme-count todo">${counts.todo} à faire</span>` : ''}
          ${counts.progress > 0 ? `<span class="theme-count progress">${counts.progress} en cours</span>` : ''}
          ${counts.done > 0 ? `<span class="theme-count done">${counts.done} fait</span>` : ''}
        </div>
      </div>
      <div class="theme-actions ${collapsed ? 'collapsed' : ''}">
        ${actions.map(renderActionRow).join('')}
      </div>
    </div>
  `;
}

function renderActionRow(a, opts = {}) {
  const { primary, co } = getActionOwners(a);
  const allOwners = [primary, ...co].filter(Boolean);
  const dU = daysUntil(a.deadline);
  const isOverdue = a.status !== 'done' && dU !== null && dU < 0;
  const isSoon = a.status !== 'done' && dU !== null && dU >= 0 && dU <= 3;
  const dateLabel = a.deadline
    ? (isOverdue ? `Retard ${Math.abs(dU)}j` : dU === 0 ? "Aujourd'hui" : dU > 0 && dU <= 14 ? `Dans ${dU}j` : formatDateShort(a.deadline))
    : (a.deadlineNote || '—');
  const dateColor = isOverdue ? 'text-red' : isSoon ? 'text-amber' : 'text-muted';
  const commentCount = (a.comments || []).length;
  const isSelected = state.selectedActionIds.has(a.id);
  const archived = a.archived;

  return `
    <div class="action-row ${a.status === 'done' ? 'done' : ''} ${isSelected ? 'selected' : ''}" data-open-action="${a.id}">
      ${!archived ? `
        <button class="select-checkbox ${isSelected ? 'checked' : ''}" data-toggle-select="${a.id}" title="${isSelected ? 'Désélectionner' : 'Sélectionner pour ordre du jour'}" onclick="event.stopPropagation()">
          ${isSelected ? icon('squareCheck', 16) : icon('square', 16)}
        </button>
      ` : '<span></span>'}
      <button class="action-checkbox ${a.status === 'done' ? 'checked' : ''}" data-toggle-status="${a.id}" title="Marquer comme terminée">
        ${a.status === 'done' ? icon('check', 14) : ''}
      </button>
      <div class="grow">
        <div class="action-title">${escapeHtml(a.title)}</div>
        <div class="action-meta">
          <span class="${dateColor}" style="${isOverdue ? 'font-weight:600;' : ''}">${escapeHtml(dateLabel)}</span>
          ${a.priority === 'high' ? `<span>·</span><span class="text-red" style="font-weight:600;">Haute</span>` : ''}
          ${commentCount > 0 ? `<span class="comment-bubble">${icon('message', 11)} ${commentCount}</span>` : ''}
          ${archived ? `<span>·</span><span class="text-subtle">Archivée le ${formatDateShort(a.archivedAt)}</span>` : ''}
        </div>
      </div>
      <div class="hide-mobile">${avatarStack(allOwners.length ? allOwners : [], 26, 3)}</div>
      <span class="status-badge ${STATUS_META[a.status].cls} hide-mobile">
        <span class="dot"></span>${STATUS_META[a.status].label}
      </span>
      <span class="text-subtle">${icon('chevronRight', 16)}</span>
    </div>
  `;
}

// ─── Action detail modal ──────────────────────────────────────────
function openActionDetail(actionId) {
  const a = state.data.actions.find(x => x.id === actionId);
  if (!a) return;
  const data = state.data;

  const renderBody = () => {
    const action = state.data.actions.find(x => x.id === actionId);
    if (!action) return '';
    const { primary, co } = getActionOwners(action);
    const dU = daysUntil(action.deadline);
    const isOverdue = action.status !== 'done' && dU !== null && dU < 0;

    const comments = [...(action.comments || [])].sort((a,b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
    const history = [...(action.history || [])].sort((a,b) => (b.date || '').localeCompare(a.date || ''));

    return `
      <div class="detail-section">
        <div class="grid-2" style="margin-bottom:14px;">
          <div>
            <label style="font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);font-weight:600;display:block;margin-bottom:6px;">Thème</label>
            <select class="input" id="ad-theme">
              ${data.themes.map(t => `<option value="${escapeHtml(t)}" ${action.theme === t ? 'selected' : ''}>${escapeHtml(t)}</option>`).join('')}
            </select>
          </div>
          <div>
            <label style="font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);font-weight:600;display:block;margin-bottom:6px;">Statut</label>
            <select class="input" id="ad-status">
              <option value="todo" ${action.status === 'todo' ? 'selected' : ''}>À faire</option>
              <option value="in_progress" ${action.status === 'in_progress' ? 'selected' : ''}>En cours</option>
              <option value="blocked" ${action.status === 'blocked' ? 'selected' : ''}>Bloqué</option>
              <option value="done" ${action.status === 'done' ? 'selected' : ''}>Terminé</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label>Titre / Tâche</label>
          <textarea class="input" id="ad-title" rows="2">${escapeHtml(action.title)}</textarea>
        </div>

        <div class="field">
          <label>Description / Détails</label>
          <textarea class="input" id="ad-description" rows="3" placeholder="Précisions, contexte, livrables attendus…">${escapeHtml(action.description || '')}</textarea>
        </div>

        <div class="grid-3">
          <div class="field" style="margin-bottom:0;">
            <label>Date démarrage</label>
            <input type="date" class="input" id="ad-startdate" value="${action.startDate || ''}">
          </div>
          <div class="field" style="margin-bottom:0;">
            <label>Échéance</label>
            <input type="date" class="input" id="ad-deadline" value="${action.deadline || ''}">
          </div>
          <div class="field" style="margin-bottom:0;">
            <label>Priorité</label>
            <select class="input" id="ad-priority">
              <option value="low" ${action.priority === 'low' ? 'selected' : ''}>Faible</option>
              <option value="medium" ${action.priority === 'medium' ? 'selected' : ''}>Moyenne</option>
              <option value="high" ${action.priority === 'high' ? 'selected' : ''}>Haute</option>
            </select>
          </div>
        </div>
        ${action.deadlineNote && !action.deadline ? `<div class="field-hint">Note d'échéance importée : « ${escapeHtml(action.deadlineNote)} »</div>` : ''}
        ${action.ownerLabel ? `<div class="field-hint" style="margin-top:8px;">Code responsable importé : « ${escapeHtml(action.ownerLabel)} »</div>` : ''}
      </div>

      <div class="detail-section">
        <h4>Attribution</h4>
        <div class="field">
          <label>Responsable principal</label>
          <select class="input" id="ad-owner">
            <option value="">— Non attribué —</option>
            ${data.members.map(m => `<option value="${m.id}" ${action.ownerId === m.id ? 'selected' : ''}>${escapeHtml(m.name)} (${escapeHtml(m.role)})</option>`).join('')}
          </select>
        </div>
        <div class="field" style="margin-bottom:0;">
          <label>Co-responsables (optionnel)</label>
          <div style="display:flex;flex-wrap:wrap;gap:6px;">
            ${data.members.map(m => {
              const checked = (action.coOwnerIds || []).includes(m.id);
              return `<button class="chip ${checked ? 'active' : ''}" data-toggle-coowner="${m.id}">${escapeHtml(m.name)}</button>`;
            }).join('')}
          </div>
        </div>
      </div>

      <div class="detail-section">
        <h4>Sous-tâches (${(action.subtasks || []).length})</h4>
        <div id="subtask-list">
          ${(action.subtasks || []).map(st => `
            <div class="subtask">
              <button class="action-checkbox ${st.done ? 'checked' : ''}" data-toggle-subtask="${st.id}">${st.done ? icon('check', 12) : ''}</button>
              <span class="subtask-text ${st.done ? 'done' : ''}">${escapeHtml(st.text)}</span>
              <button class="icon-btn" data-rm-subtask="${st.id}">${icon('x', 12)}</button>
            </div>
          `).join('')}
        </div>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <input type="text" class="input" id="new-subtask" placeholder="Ajouter une sous-tâche..." style="flex:1;">
          <button class="btn btn-secondary btn-sm" id="add-subtask-btn">${icon('plus', 12)}Ajouter</button>
        </div>
      </div>

      <div class="detail-section">
        <h4>Commentaires (${comments.length})</h4>
        <div style="margin-bottom:14px;">
          <textarea class="input" id="new-comment" rows="3" placeholder="Ajouter un commentaire..."></textarea>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;gap:8px;flex-wrap:wrap;">
            <select id="comment-author" class="input" style="width:auto;font-size:12px;padding:6px 10px;">
              <option value="">— Anonyme —</option>
              ${data.members.map(m => `<option value="${m.id}" ${state.currentUserId === m.id ? 'selected' : ''}>${escapeHtml(m.name)}</option>`).join('')}
            </select>
            <button class="btn btn-primary btn-sm" id="add-comment-btn">${icon('message', 12)}Publier le commentaire</button>
          </div>
        </div>
        <div>
          ${comments.length === 0 ? `<div class="text-subtle" style="font-size:13px;font-style:italic;text-align:center;padding:16px;">Aucun commentaire.</div>` :
            comments.map(c => {
              const author = c.authorId ? data.members.find(m => m.id === c.authorId) : null;
              const isImported = c.id && c.id.startsWith('cmt_init_') || c.id && c.id.startsWith('cmt_note_');
              return `
                <div class="comment ${isImported ? 'comment-imported' : ''}">
                  <div class="comment-header">
                    <div class="comment-author">
                      ${author ? avatar(author, 22) : '<span style="color:var(--subtle);">📥</span>'}
                      <span>${author ? escapeHtml(author.name) : (isImported ? 'Import Excel' : 'Anonyme')}</span>
                    </div>
                    <div style="display:flex;align-items:center;gap:6px;">
                      <span class="comment-date">${formatDateTime(c.createdAt)}</span>
                      <button class="icon-btn" data-rm-comment="${c.id}" title="Supprimer">${icon('trash', 12)}</button>
                    </div>
                  </div>
                  <div class="comment-text">${escapeHtml(c.text)}</div>
                </div>
              `;
            }).join('')
          }
        </div>
      </div>

      <div class="detail-section">
        <h4>Historique des modifications (${history.length})</h4>
        ${history.length === 0 ? `<div class="text-subtle" style="font-size:13px;font-style:italic;">Aucun historique.</div>` :
          history.map(h => {
            const user = h.userId ? data.members.find(m => m.id === h.userId) : null;
            return `
              <div class="history-item">
                <span class="history-dot"></span>
                <div class="history-text">
                  <div>${escapeHtml(h.action)}${user ? ` <span class="text-subtle">par ${escapeHtml(user.name)}</span>` : ''}</div>
                  <div class="history-date">${formatDateTime(h.date)}</div>
                </div>
              </div>
            `;
          }).join('')
        }
      </div>

      <div class="flex-end" style="padding-top:18px;border-top:1px solid var(--border);">
        <button class="btn btn-danger" id="ad-delete">${icon('trash', 14)}Supprimer</button>
        ${action.archived
          ? `<button class="btn btn-secondary" id="ad-unarchive">${icon('archiveRestore', 14)}Désarchiver</button>`
          : `<button class="btn btn-secondary" id="ad-archive">${icon('archive', 14)}Archiver</button>`
        }
        <button class="btn btn-ghost" id="ad-cancel">Fermer</button>
      </div>
    `;
  };

  const refresh = () => {
    document.getElementById('modal-body').innerHTML = renderBody();
    bind();
  };

  const bind = () => {
    const action = state.data.actions.find(x => x.id === actionId);
    if (!action) { closeModal(); return; }

    // Field auto-save on change
    const fieldBindings = [
      { id: 'ad-theme', key: 'theme', label: 'Thème' },
      { id: 'ad-status', key: 'status', label: 'Statut', transform: v => v, postLabel: v => STATUS_META[v].label },
      { id: 'ad-title', key: 'title', label: 'Titre' },
      { id: 'ad-description', key: 'description', label: 'Description' },
      { id: 'ad-startdate', key: 'startDate', label: 'Date démarrage' },
      { id: 'ad-deadline', key: 'deadline', label: 'Échéance', postLabel: v => formatDate(v) },
      { id: 'ad-priority', key: 'priority', label: 'Priorité', postLabel: v => PRIORITY_LABEL[v] },
      { id: 'ad-owner', key: 'ownerId', label: 'Responsable', postLabel: v => v ? state.data.members.find(m => m.id === v)?.name || v : 'Non attribué' },
    ];
    for (const fb of fieldBindings) {
      const el = document.getElementById(fb.id);
      if (!el) continue;
      el.onchange = () => {
        const newVal = el.value;
        const oldVal = action[fb.key];
        if (newVal === oldVal) return;
        const histText = `${fb.label} → ${fb.postLabel ? fb.postLabel(newVal) : (newVal || '—')}`;
        patchAction(actionId, { [fb.key]: newVal }, histText);
      };
      // For text inputs/textareas use blur
      if (el.tagName === 'TEXTAREA' || (el.tagName === 'INPUT' && el.type === 'text')) {
        el.onchange = null;
        el.onblur = () => {
          const newVal = el.value.trim();
          const oldVal = action[fb.key] || '';
          if (newVal === oldVal) return;
          if (!newVal && fb.key === 'title') { el.value = oldVal; return; } // don't allow empty title
          patchAction(actionId, { [fb.key]: newVal }, `${fb.label} modifié`);
        };
      }
    }

    // Co-owners
    document.querySelectorAll('[data-toggle-coowner]').forEach(b => {
      b.onclick = () => {
        const id = b.dataset.toggleCoowner;
        const has = (action.coOwnerIds || []).includes(id);
        const newCo = has ? (action.coOwnerIds || []).filter(x => x !== id) : [...(action.coOwnerIds || []), id];
        const member = state.data.members.find(m => m.id === id);
        patchAction(actionId, { coOwnerIds: newCo }, `Co-responsable ${has ? 'retiré' : 'ajouté'} : ${member.name}`);
        refresh();
      };
    });

    // Subtasks
    document.getElementById('add-subtask-btn').onclick = () => {
      const input = document.getElementById('new-subtask');
      const text = input.value.trim();
      if (!text) return;
      const newSubtask = { id: uid('st'), text, done: false };
      patchAction(actionId, { subtasks: [...(action.subtasks || []), newSubtask] }, `Sous-tâche ajoutée : ${text}`);
      refresh();
    };
    document.getElementById('new-subtask').onkeydown = (e) => {
      if (e.key === 'Enter') { e.preventDefault(); document.getElementById('add-subtask-btn').click(); }
    };
    document.querySelectorAll('[data-toggle-subtask]').forEach(b => {
      b.onclick = () => {
        const id = b.dataset.toggleSubtask;
        const newSubtasks = action.subtasks.map(st => st.id === id ? { ...st, done: !st.done } : st);
        const st = action.subtasks.find(s => s.id === id);
        patchAction(actionId, { subtasks: newSubtasks }, `Sous-tâche ${st.done ? 'rouverte' : 'terminée'} : ${st.text}`);
        refresh();
      };
    });
    document.querySelectorAll('[data-rm-subtask]').forEach(b => {
      b.onclick = () => {
        const id = b.dataset.rmSubtask;
        const st = action.subtasks.find(s => s.id === id);
        patchAction(actionId, { subtasks: action.subtasks.filter(s => s.id !== id) }, `Sous-tâche supprimée : ${st.text}`);
        refresh();
      };
    });

    // Comments
    document.getElementById('add-comment-btn').onclick = () => {
      const text = document.getElementById('new-comment').value.trim();
      if (!text) return;
      const authorId = document.getElementById('comment-author').value || null;
      if (authorId) { state.currentUserId = authorId; saveCurrentUser(authorId); }
      const newComment = { id: uid('cmt'), text, authorId, createdAt: nowISO() };
      patchAction(actionId, { comments: [...(action.comments || []), newComment] }, `Commentaire ajouté${authorId ? ' par ' + state.data.members.find(m => m.id === authorId).name : ''}`);
      refresh();
      toast('Commentaire publié');
    };
    document.getElementById('comment-author').onchange = (e) => {
      state.currentUserId = e.target.value || null;
      saveCurrentUser(state.currentUserId);
    };
    document.querySelectorAll('[data-rm-comment]').forEach(b => {
      b.onclick = () => {
        confirmDialog('Supprimer ce commentaire ?', () => {
          patchAction(actionId, { comments: action.comments.filter(c => c.id !== b.dataset.rmComment) }, `Commentaire supprimé`);
          refresh();
        });
      };
    });

    // Delete / cancel
    document.getElementById('ad-cancel').onclick = closeModal;
    document.getElementById('ad-delete').onclick = () => {
      confirmDialog('Supprimer définitivement cette action ?', () => {
        update(d => ({ ...d, actions: d.actions.filter(x => x.id !== actionId) }));
        closeModal();
        toast('Action supprimée');
      });
    };
    document.getElementById('ad-archive')?.addEventListener('click', () => {
      const now = nowISO();
      patchAction(actionId, { archived: true, archivedAt: now }, 'Tâche archivée');
      closeModal();
      toast('Tâche archivée');
    });
    document.getElementById('ad-unarchive')?.addEventListener('click', () => {
      patchAction(actionId, { archived: false, archivedAt: null }, 'Tâche désarchivée');
      closeModal();
      toast('Tâche désarchivée');
    });
  };

  openModal(a.title.length > 60 ? a.title.slice(0, 60) + '…' : a.title, renderBody(), {
    wide: true,
    onMount: bind,
  });
}
