<!doctype html>
<html lang="fr">
<head>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Black&display=swap" rel="stylesheet">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Réseau Audit — Suivi des franchises</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.460.0/lucide.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap');
:root{
  --paper:#F3EFE7; --paper2:#FBF9F4; --card:#FFFFFF;
  --ink:#1F231E; --ink-soft:#565B50; --ink-mute:#9A9C90;
  --line:#E4DDD0; --line2:#EFEAE0;
  --clay:#BD4A2A; --clay-d:#9C3C20; --clay-soft:#F6E4DC;
  --petrol:#1F5E59; --petrol-soft:#DBE9E6;
  --green:#2F7D4F; --amber:#C2891B; --red:#BE382C;
}
*{box-sizing:border-box}
body{margin:0}
.fnet{font-family:'Hanken Grotesk',sans-serif;color:var(--ink);background:var(--paper);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}
.fnet h1,.fnet h2,.fnet h3,.disp{font-family:'Bricolage Grotesque',sans-serif;letter-spacing:-.02em}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}
i[data-lucide]{width:17px;height:17px;stroke-width:2}
.shell{display:flex;min-height:100vh}
.side{width:230px;flex-shrink:0;background:var(--ink);color:#E7E3D7;padding:22px 16px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh}
.brand{font-family:'Bricolage Grotesque';font-weight:800;font-size:19px;line-height:1.05;color:#fff;margin-bottom:2px}
.brand small{display:block;font-family:'Hanken Grotesk';font-weight:500;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--clay);margin-top:6px}
.navsec{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#7d8074;margin:18px 8px 6px}
.navitem{display:flex;align-items:center;gap:11px;padding:10px 12px;border:none;background:transparent;color:#C9C5B8;border-radius:9px;width:100%;text-align:left;font-size:14px;font-weight:500;transition:.15s}
.navitem:hover{background:#2c302a;color:#fff}
.navitem.on{background:var(--clay);color:#fff}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 28px;border-bottom:1px solid var(--line);background:var(--paper2);position:sticky;top:0;z-index:20}
.content{padding:26px 28px 60px;max-width:1240px;width:100%}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:9px;border:1px solid var(--line);background:var(--card);color:var(--ink);font-weight:600;font-size:13px;transition:.15s}
.btn:hover{border-color:var(--ink-mute)}
.btn.pri{background:var(--clay);border-color:var(--clay);color:#fff}
.btn.pri:hover{background:var(--clay-d)}
.btn.ghost{background:transparent;border-color:transparent;color:var(--ink-soft)}
.btn.sm{padding:6px 10px;font-size:12px;border-radius:8px}
.btn.danger{color:var(--red)}
.btn:disabled{opacity:.45;cursor:default}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px}
.pad{padding:18px}
.in{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:var(--paper2);font-size:14px;color:var(--ink);outline:none;transition:.15s}
.in:focus{border-color:var(--clay);background:#fff}
.in:disabled{background:#f0ece3;color:var(--ink-soft)}
.lab{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin-bottom:5px;display:block}
.numin{text-align:right;font-variant-numeric:tabular-nums;font-weight:700}
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.02em}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:700}
.badge i{width:13px;height:13px}
.grid{display:grid;gap:16px}
.kpibig{font-family:'Bricolage Grotesque';font-weight:800;font-size:30px;line-height:1;font-variant-numeric:tabular-nums}
.muted{color:var(--ink-soft)}
.tiny{font-size:11px}
.sep{height:1px;background:var(--line2);margin:14px 0}
.tabbar{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:22px;flex-wrap:wrap}
.tab{padding:10px 16px;border:none;background:transparent;border-bottom:2px solid transparent;color:var(--ink-soft);font-weight:600;font-size:14px;margin-bottom:-1px}
.tab.on{color:var(--clay);border-color:var(--clay)}
.agrow{display:grid;grid-template-columns:1.4fr .9fr .9fr .9fr .8fr .7fr;gap:12px;align-items:center;padding:13px 16px;border-top:1px solid var(--line2)}
.agrow.head{border-top:none;background:var(--paper2);font-weight:700}
.agrow.clk{cursor:pointer}
.agrow.clk:hover{background:var(--paper2)}
.bar{height:7px;border-radius:99px;background:var(--line2);overflow:hidden}
.bar>i{display:block;height:100%;border-radius:99px}
.modal-bg{position:fixed;inset:0;background:rgba(31,35,30,.42);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal{background:var(--card);border-radius:16px;max-width:520px;width:100%;padding:24px;box-shadow:0 30px 60px -20px rgba(0,0,0,.4)}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px;padding:12px 14px;border-radius:12px;background:var(--paper2);border:1px solid var(--line)}
.leafblock{padding:14px 0;border-top:1px solid var(--line2)}
.leafblock:first-child{border-top:none}
.leafhead{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:9px}
.rowline{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.rowline .in{margin:0}
.rowline .emp{width:170px;flex-shrink:0}
.rowline .val{width:84px;flex-shrink:0}
.rowline .note{width:72px;flex-shrink:0}
.rowline .mcol{width:62px;flex-shrink:0;text-align:center}
.rowline .cmt{flex:1;min-width:120px}
.rowline.mhead{margin-bottom:2px}
.mlab{align-self:flex-end;text-align:center;color:var(--ink-soft);font-weight:700;line-height:1.15}
.rowline.mhead .emp.mlab,.rowline.mhead .cmt.mlab{text-align:left}
.starbtn{background:none;border:none;padding:0;line-height:0}
.starbtn i{width:16px;height:16px}
.fade{animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.empty{text-align:center;padding:60px 20px;color:var(--ink-soft)}
.chartbox{height:300px}
.ratbl{border-collapse:collapse;width:100%;font-size:13px;min-width:520px}
.ratbl th{font-size:10px;letter-spacing:.03em;text-transform:uppercase;color:var(--ink-soft);font-weight:700;padding:7px 8px;text-align:center;border-bottom:1px solid var(--line)}
.ratbl td{padding:8px;text-align:center;font-variant-numeric:tabular-nums;border-bottom:1px solid var(--line2)}
.ratbl tr.agtot td{border-top:2px solid var(--line);border-bottom:none;background:var(--paper2)}
@media(max-width:820px){.side{display:none}.agrow{grid-template-columns:1fr;gap:6px}.rowline{flex-wrap:wrap}.rowline .emp,.rowline .val,.rowline .note,.rowline .mcol{width:auto;flex:1}.rowline.mhead{display:none}}
#print-root{display:none}
.pr-doc{font-family:Arial,Helvetica,sans-serif;color:#1F231E;max-width:820px;margin:0 auto;padding:20px;font-size:12px}
.pr-head{display:flex;justify-content:space-between;border-bottom:2px solid #BD4A2A;padding-bottom:10px;margin-bottom:14px}
.pr-title{font-size:20px;font-weight:800}
.pr-section{margin-bottom:10px}
.pr-st{font-weight:800;font-size:14px;border-bottom:1px solid #E4DDD0;margin:12px 0 6px;color:#9C3C20}
.pr-leaf{margin:6px 0 6px 2px}
.pr-lt{font-weight:700;margin-bottom:2px}
.pr-mut{color:#9A9C90;font-weight:400;font-size:11px}
.pr-note{color:#565B50;font-style:italic;margin-top:2px}
.pr-foot{margin-top:18px;color:#9A9C90;font-size:10px}
.pr-tb{border-collapse:collapse;width:100%;font-size:11px;margin-top:3px}
.pr-tb th{background:#F3EFE7;text-align:left;padding:4px 7px;border:1px solid #E4DDD0;font-size:10px;text-transform:uppercase;letter-spacing:.03em}
.pr-tb td{padding:4px 7px;border:1px solid #EFEAE0}
@media print{
  body.printing>.fnet,body.printing>#modal-root{display:none!important}
  body.printing>#print-root{display:block!important}
  .pr-section,.pr-leaf{break-inside:avoid}
}

/* ============================================================
   CHARTE GRAPHIQUE NATURÉA — source : Plaquette commerciale V10
   Vert du logo #41532A (accent principal) · Terracotta #D69362 (secondaire)
   Police Archivo (substitut de Gopher)
   ============================================================ */
:root{
  /* Fonds & neutres */
  --bg:#FBFAF5!important; --paper:#FBFAF5!important; --paper2:#FFFFFF!important;
  --surface:#FFFFFF!important; --white:#FFFFFF!important; --card:#FFFFFF!important; --bg4:#FFFFFF!important;
  --surface-alt:#F2EDE3!important; --cream:#F2EDE3!important; --sand:#F2EDE3!important; --sand2:#E9E1D1!important;
  --mist:#F6F2E9!important; --faint:#F6F2E9!important; --bg2:#F2EDE3!important; --bg3:#E9E1D1!important;
  --ink:#1E2A18!important; --text:#1E2A18!important; --ink2:#2E3A26!important; --ink3:#46503C!important;
  --text2:#46503C!important; --text3:#5E6B4F!important; --ink-soft:#46503C!important; --ink-mute:#9BA889!important;
  --muted:#5E6B4F!important; --subtle:#9BA889!important;
  --border:#E2DCCD!important; --border2:#EDE7DA!important; --border-strong:#D8D0BC!important;
  --line:#E2DCCD!important; --line2:#EDE7DA!important;
  /* Accent PRINCIPAL = VERT DU LOGO #41532A (toutes les variantes "primaire") */
  --accent:#41532A!important; --accent-soft:#EAEFE0!important; --accent-ink:#38471F!important;
  --primary:#41532A!important; --primary-l:#556B36!important; --primary-d:#38471F!important; --primary-soft:#EAEFE0!important;
  --forest:#41532A!important; --forest2:#38471F!important;
  --gold:#41532A!important; --gold2:#38471F!important; --gold3:#EAEFE0!important;
  --blue:#41532A!important; --blue-dark:#38471F!important; --blue-light:#EAEFE0!important;
  --clay:#41532A!important; --clay-d:#38471F!important; --clay-soft:#EAEFE0!important;
  --green:#41532A!important; --green-soft:#EAEFE0!important; --ok:#41532A!important;
  /* Accent SECONDAIRE = ORANGE DU LOGO #D69362 */
  --wood:#D69362!important; --wood-soft:#F6E7D7!important; --wood-ink:#B87648!important;
  --wood-l:#E2A982!important; --wood-d:#B87648!important;
  --orange:#D69362!important; --orange-dark:#B87648!important;
  --terra:#D69362!important; --terra2:#B87648!important;
  --petrol:#D69362!important; --petrol-soft:#F6E7D7!important;
  --purple:#D69362!important;
  /* Olive / sauge (tertiaire) */
  --sage:#839049!important; --sage2:#6B7A3A!important; --yellow:#C68B2C!important;
  /* Sémantique */
  --warn:#C68B2C!important; --amber:#C68B2C!important; --amber-soft:#F7ECD7!important;
  --danger:#B8453D!important; --red:#B8453D!important; --red-soft:#F5DEDC!important;
  /* Familles de police */
  --sans:'Archivo',system-ui,-apple-system,sans-serif!important;
  --serif:'Archivo','Archivo Black',system-ui,sans-serif!important;
  --display:'Archivo','Archivo Black',system-ui,sans-serif!important;
  --mono:'Archivo',ui-monospace,'SF Mono',Consolas,monospace!important;
}
html, body, button, input, select, textarea, p, span, td, th, li, a, label, div, small, strong, b {
  font-family:'Archivo',system-ui,-apple-system,sans-serif!important;
}
h1, h2, h3, h4, h5, h6,
.disp, .kpibig, .brand, .page-title, .kpi-v, .stat-v, [class*="title"], [class*="kpi-v"] {
  font-family:'Archivo','Archivo Black',system-ui,sans-serif!important;
  font-weight:800!important; letter-spacing:-0.01em!important;
}
code, pre, .mono, [class*="mono"] {
  font-family:'Archivo',ui-monospace,'SF Mono',Consolas,monospace!important;
}

</style>
</head>
<body>
<div class="fnet">
  <div class="shell">
    <aside class="side" id="side"></aside>
    <div class="main">
      <div class="topbar" id="topbar"></div>
      <div class="content" id="content"></div>
    </div>
  </div>
</div>
<div id="modal-root"></div>
<div id="print-root"></div>

<script>
/* ============================== CONFIG ============================== */
const DATA_KEY="fnet:data:v1";
const docKey=id=>"fnet:doc:"+id;
const AUDIT=[
 {id:"mkt",label:"Marketing",children:[
   {id:"mkt.annonce",label:"Annonce",kind:"num",hint:"Nb d'annonces mises en ligne"},
   {id:"mkt.rs",label:"Réseaux sociaux",kind:"num",hint:"Nb de publications / mois"},
   {id:"mkt.ac",label:"Action commerciale",children:[
     {id:"mkt.ac.po",label:"Portes ouvertes (PO)",kind:"num",hint:"Nb de portes ouvertes organisées"},
     {id:"mkt.ac.panneau",label:"Panneautage",kind:"num",hint:"Nb de panneaux posés"},
   ]},
   {id:"mkt.avis",label:"Avis client",kind:"num",hint:"Nb d'avis recueillis"},
   {id:"mkt.appreciation",label:"Appréciation globale",kind:"text",hint:"Appréciation générale du marketing de l'agence"},
 ]},
 {id:"cli",label:"Clientèle",children:[
   {id:"cli.contact",label:"Contacts mensuels",children:[
     {id:"cli.contact.entrant",label:"Contacts entrants",kind:"num",kpi:"entrant",hint:"Nb de contacts entrants reçus"},
     {id:"cli.contact.traite",label:"Traités",kind:"num",kpi:"contacts",hint:"Nb de contacts traités"},
     {id:"cli.contact.relance",label:"À relancer",kind:"num",hint:"Nb de contacts à relancer"},
     {id:"cli.contact.rdv",label:"RDV pris",kind:"multi",kpi:"rdv",hint:"Par salarié : nb de R1, R2, R3 et signatures prises (RDV = R1+R2+R3)",cols:[
       {key:"r1",label:"R1"},{key:"r2",label:"R2"},{key:"r3",label:"R3"},{key:"sign",label:"Signature"},
     ]},
     {id:"cli.contact.hs",label:"Contacts HS",kind:"calc",kpi:"hs",hint:"Calcul automatique : entrants − (traités + à relancer)"},
   ]},
   {id:"cli.fiche",label:"Fiche découverte",kind:"qual",hint:"Qualité de la découverte client, par salarié (commentaire + note)"},
   {id:"cli.signatures",label:"Signatures",kind:"num",kpi:"signatures",hint:"Nb de signatures"},
   {id:"cli.ccmi",label:"Nombre de résiliations",kind:"num",kpi:"ccmi",hint:"Nb de résiliations sur le mois"},
 ]},
 {id:"dev",label:"Développement",children:[
   {id:"dev.foncier",label:"Recherche foncière",children:[
     {id:"dev.foncier.terrain",label:"Nouveaux terrains",kind:"num",hint:"Nb de nouveaux terrains sur le mois"},
   ]},
   {id:"dev.part",label:"Partenaires",children:[
     {id:"dev.part.new",label:"Nouveaux partenaires",kind:"num",hint:"Nb de nouveaux partenaires sur le mois"},
   ]},
 ]},
];
const LEAFKIND={},LEAFNODE={},NUMLEAVES=[],MULTILEAVES=[];
(function walk(ns){ns.forEach(n=>{if(n.children)walk(n.children);else{LEAFKIND[n.id]=n.kind;LEAFNODE[n.id]=n;if(n.kind==="num")NUMLEAVES.push(n.id);if(n.kind==="multi")MULTILEAVES.push(n.id);}});})(AUDIT);

/* ============================== UTILS ============================== */
const uid=()=>Math.random().toString(36).slice(2,10);
const MFR=["Janv","Févr","Mars","Avr","Mai","Juin","Juil","Août","Sept","Oct","Nov","Déc"];
const todayYM=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");};
const todayISO=()=>new Date().toISOString().slice(0,10);
const ymLabel=ym=>{const[y,m]=ym.split("-");return MFR[+m-1]+" "+y;};
const ymShort=ym=>{const[y,m]=ym.split("-");return MFR[+m-1]+" "+y.slice(2);};
const fmtDate=iso=>{if(!iso)return"—";const[y,m,d]=iso.split("-");return d+"/"+m+"/"+y;};
function monthsBack(ym,n){const[y,m]=ym.split("-").map(Number);const o=[];for(let i=n-1;i>=0;i--){const d=new Date(y,m-1-i,1);o.push(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"));}return o;}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}
function leafTotal(au,id){const lf=au&&au.leaves&&au.leaves[id];if(!lf||!lf.rows)return 0;return lf.rows.reduce((s,r)=>s+(Number(r.val)||0),0);}
function leafTotalEmp(au,id,empId){const lf=au&&au.leaves&&au.leaves[id];if(!lf||!lf.rows)return 0;return lf.rows.reduce((s,r)=>(empId!=null&&r.empId!==empId)?s:s+(Number(r.val)||0),0);}
function rdvTotal(au,empId){const lf=au&&au.leaves&&au.leaves["cli.contact.rdv"];if(!lf||!lf.rows)return 0;return lf.rows.reduce((s,r)=>{if(empId!=null&&r.empId!==empId)return s;const v=r.vals||{};return s+(Number(v.r1)||0)+(Number(v.r2)||0)+(Number(v.r3)||0);},0);}
function rdvCol(au,empId,key){const lf=au&&au.leaves&&au.leaves["cli.contact.rdv"];if(!lf||!lf.rows)return 0;return lf.rows.reduce((s,r)=>(empId!=null&&r.empId!==empId)?s:s+(Number(r.vals&&r.vals[key])||0),0);}
function computeHS(au,empId){return leafTotalEmp(au,"cli.contact.entrant",empId)-(leafTotalEmp(au,"cli.contact.traite",empId)+leafTotalEmp(au,"cli.contact.relance",empId));}
function ratiosFrom(c){const pct=(n,d)=>d>0?n/d*100:null;return Object.assign({},c,{r_traite:pct(c.traite,c.entrant),r_rdv:pct(c.rdv,c.entrant),r_sign:pct(c.sign,c.entrant),r_sign_r1:pct(c.sign,c.r1),r_resil:pct(c.resil,c.sign),r_hs:pct(c.hs,c.entrant)});}
function computeRatios(au,empId){return ratiosFrom({entrant:leafTotalEmp(au,"cli.contact.entrant",empId),traite:leafTotalEmp(au,"cli.contact.traite",empId),rdv:rdvTotal(au,empId),r1:rdvCol(au,empId,"r1"),sign:leafTotalEmp(au,"cli.signatures",empId),resil:leafTotalEmp(au,"cli.ccmi",empId),hs:computeHS(au,empId)});}
function computeRatiosMonth(a,ym,empId){const c={entrant:0,traite:0,rdv:0,r1:0,sign:0,resil:0,hs:0};monthAuditsAll(a,ym).forEach(au=>{c.entrant+=leafTotalEmp(au,"cli.contact.entrant",empId);c.traite+=leafTotalEmp(au,"cli.contact.traite",empId);c.rdv+=rdvTotal(au,empId);c.r1+=rdvCol(au,empId,"r1");c.sign+=leafTotalEmp(au,"cli.signatures",empId);c.resil+=leafTotalEmp(au,"cli.ccmi",empId);c.hs+=computeHS(au,empId);});return ratiosFrom(c);}
function computeKpis(au){const contacts=leafTotal(au,"cli.contact.traite"),signatures=leafTotal(au,"cli.signatures"),ccmi=leafTotal(au,"cli.ccmi"),entrant=leafTotal(au,"cli.contact.entrant");return{contacts,signatures,ccmi,entrant,transfo:contacts>0?signatures/contacts*100:0};}
function computeAch(au,obj){if(!au||!obj||!(obj.signatures>0))return null;return computeKpis(au).signatures/obj.signatures;}
/* ---- agrégation MENSUELLE : tous les audits d'un mois se cumulent (somme) ---- */
function monthAuditsAll(a,ym){return (a.audits||[]).filter(au=>au.date&&au.date.slice(0,7)===ym);}
function monthKpis(a,ym){let c=0,s=0,r=0,e=0;monthAuditsAll(a,ym).forEach(au=>{const k=computeKpis(au);c+=k.contacts;s+=k.signatures;r+=k.ccmi;e+=k.entrant;});return{contacts:c,signatures:s,ccmi:r,entrant:e,transfo:c>0?s/c*100:0};}
function computeAchMonth(a,ym){const obj=a.objectives;if(!obj||!(obj.signatures>0))return null;if(!monthAuditsAll(a,ym).length)return null;return monthKpis(a,ym).signatures/obj.signatures;}
function monthNoteStats(a,ym){const per={};let gsum=0,gcount=0;monthAuditsAll(a,ym).forEach(au=>{Object.keys(au.leaves||{}).forEach(id=>{const lf=au.leaves[id];if(lf&&Array.isArray(lf.rows))lf.rows.forEach(row=>{const n=Number(row.note);if(row.empId&&row.note!==""&&row.note!=null&&!isNaN(n)){per[row.empId]=per[row.empId]||{sum:0,count:0};per[row.empId].sum+=n;per[row.empId].count++;gsum+=n;gcount++;}});});});const emp={};Object.keys(per).forEach(eid=>{emp[eid]={avg:per[eid].sum/per[eid].count,count:per[eid].count};});return{emp,agency:gcount?gsum/gcount:null,rated:Object.keys(per).length,points:gcount};}
function statusVar(ach,th){if(ach==null)return"var(--ink-mute)";if(ach>=1)return"var(--green)";if(ach>=th)return"var(--amber)";return"var(--red)";}
function statusHex(ach,th){if(ach==null)return"#9A9C90";if(ach>=1)return"#2F7D4F";if(ach>=th)return"#C2891B";return"#BE382C";}
/* per-salarié /10 note stats across all audited points of one audit */
function noteStats(au){
  const per={};let gsum=0,gcount=0;
  if(au&&au.leaves){Object.keys(au.leaves).forEach(id=>{const lf=au.leaves[id];if(lf&&Array.isArray(lf.rows)){lf.rows.forEach(r=>{const n=Number(r.note);if(r.empId&&r.note!==""&&r.note!=null&&!isNaN(n)){per[r.empId]=per[r.empId]||{sum:0,count:0};per[r.empId].sum+=n;per[r.empId].count++;gsum+=n;gcount++;}});}});}
  const emp={};Object.keys(per).forEach(eid=>{emp[eid]={avg:per[eid].sum/per[eid].count,count:per[eid].count};});
  return{emp,agency:gcount?gsum/gcount:null,rated:Object.keys(per).length,points:gcount};
}
function empPointNotes(au,empId){
  const out=[];
  if(au&&au.leaves){Object.keys(au.leaves).forEach(id=>{const lf=au.leaves[id];if(lf&&Array.isArray(lf.rows)){lf.rows.forEach(r=>{const n=Number(r.note);if(r.empId===empId&&r.note!==""&&r.note!=null&&!isNaN(n))out.push({label:(LEAFNODE[id]&&LEAFNODE[id].label)||id,note:n});});}});}

}

/* ============================== STATE & STORAGE ============================== */
/* Stockage robuste : 1) API persistante d'artifact si présente, 2) localStorage (fichier ouvert directement dans le navigateur), 3) mémoire (dernier recours, sans persistance). */
const STORE=(()=>{
  if(typeof window!=="undefined"&&window.storage&&typeof window.storage.get==="function"){
    return{kind:"artifact",get:k=>window.storage.get(k,false),set:(k,v)=>window.storage.set(k,v,false),del:k=>window.storage.delete(k,false),list:p=>window.storage.list(p,false)};
  }
  let ls=null;try{const t="__fnet_t__";window.localStorage.setItem(t,"1");window.localStorage.removeItem(t);ls=window.localStorage;}catch(e){ls=null;}
  if(ls){return{kind:"local",
    get:async k=>{const v=ls.getItem(k);return v==null?null:{value:v};},
    set:async(k,v)=>{ls.setItem(k,v);return{value:v};},
    del:async k=>{ls.removeItem(k);return{deleted:true};},
    list:async p=>{const keys=[];for(let i=0;i<ls.length;i++){const key=ls.key(i);if(!p||key.indexOf(p)===0)keys.push(key);}return{keys};}};}
  const mem={};return{kind:"memory",
    get:async k=>k in mem?{value:mem[k]}:null,
    set:async(k,v)=>{mem[k]=v;return{value:v};},
    del:async k=>{delete mem[k];return{deleted:true};},
    list:async p=>({keys:Object.keys(mem).filter(k=>!p||k.indexOf(p)===0)})};
})();
const hasStore=STORE.kind!=="memory";
const state={agencies:[],settings:{threshold:0.8,noteThreshold:5},ym:todayYM(),route:{view:"network",id:null},tab:"synthese",synthView:"mois",auditId:null,closed:new Set(),openNotes:new Set(),bulk:"",archOpen:false,auditEdit:false,auditExpanded:new Set()};
let saveTimer;
function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(async()=>{try{await STORE.set(DATA_KEY,JSON.stringify({version:2,agencies:state.agencies,settings:state.settings}));}catch(e){console.error(e);}},500);}
async function loadData(){try{const r=await STORE.get(DATA_KEY);return r?JSON.parse(r.value):null;}catch{return null;}}

const currentAgency=()=>state.agencies.find(a=>a.id===state.route.id);
const currentAudit=()=>{const a=currentAgency();return a?(a.audits||[]).find(au=>au.id===state.auditId)||null:null;};
function monthAudit(a,ym){const list=(a.audits||[]).filter(au=>au.date&&au.date.slice(0,7)===ym);if(!list.length)return null;const fin=list.filter(au=>au.status==="validated"||au.status==="archived");const pool=fin.length?fin:list;return pool.slice().sort((x,y)=>x.date.localeCompare(y.date)).slice(-1)[0];}
function isLocked(au){return !!au&&au.status!=="draft";}
function defaultAuditId(a){if(!a||!(a.audits||[]).length)return null;const inM=monthAuditsAll(a,state.ym);if(inM.length)return inM.slice().sort((x,y)=>y.date.localeCompare(x.date))[0].id;return a.audits.slice().sort((x,y)=>y.date.localeCompare(x.date))[0].id;}
function ensureLeaf(au,id){au.leaves=au.leaves||{};if(!au.leaves[id])au.leaves[id]=LEAFKIND[id]==="text"?{text:"",note:""}:{rows:[],note:""};return au.leaves[id];}

/* ----- migration v1 (months) -> v2 (audits[]) + leaf shapes ----- */
function convOldLeaf(id,v){
  if(LEAFKIND[id]==="text")return{text:(v&&v.val)||"",note:(v&&v.note)||""};
  const has=(v&&v.val!==""&&v.val!=null)||(v&&v.emp);
  return{rows:has?[{id:uid(),empId:(v&&v.emp)||"",val:Number(v&&v.val)||0,comment:""}]:[],note:(v&&v.note)||""};
}
function normLeaf(id,lf){
  const kind=LEAFKIND[id];
  if(kind==="text"){if(lf&&typeof lf.text==="string")return lf;return{text:(lf&&lf.val)||"",note:(lf&&lf.note)||""};}
  if(lf&&Array.isArray(lf.rows)){lf.rows.forEach(r=>{if(!r.id)r.id=uid();if(kind==="multi"&&(!r.vals||typeof r.vals!=="object"))r.vals={};});return lf;}
  return convOldLeaf(id,lf||{});
}
function migrate(data){
  data=data||{};
  data.agencies=(data.agencies||[]).map(a=>{
    a.employees=a.employees||[];a.objectives=a.objectives||{};a.documents=a.documents||[];
    if(!a.audits){
      a.audits=[];
      const months=a.months||{};
      Object.keys(months).sort().forEach(ym=>{
        const m=months[ym],leaves={};
        Object.keys(m.audit||{}).forEach(id=>{leaves[id]=convOldLeaf(id,m.audit[id]);});
        a.audits.push({id:uid(),date:(m.visitDate||ym+"-15"),status:"validated",leaves,empRatings:m.empRatings||{},note:(m.note??"")});
      });
      delete a.months;
    }
    (a.audits||[]).forEach(au=>{au.leaves=au.leaves||{};au.empRatings=au.empRatings||{};if(au.status==="archived")au.status="validated";if(!au.status)au.status="draft";Object.keys(au.leaves).forEach(id=>{au.leaves[id]=normLeaf(id,au.leaves[id]);});});
    return a;
  });
  data.settings=Object.assign({threshold:0.8,noteThreshold:5},data.settings||{});
  return data;
}

/* image downscale */
function fileToScaledDataURL(file,maxW=1400,q=.82){return new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>{const img=new Image();img.onload=()=>{const sc=Math.min(1,maxW/img.width);const c=document.createElement("canvas");c.width=Math.round(img.width*sc);c.height=Math.round(img.height*sc);c.getContext("2d").drawImage(img,0,0,c.width,c.height);res(c.toDataURL("image/jpeg",q));};img.onerror=rej;img.src=fr.result;};fr.onerror=rej;fr.readAsDataURL(file);});}

/* ----- AUDIT FORM ----- */
function leafHTML(node,au,ro){
  const noteOpen=state.openNotes.has(node.id);
  /* ---- TEXT leaf (ex: Appréciation globale) ---- */
  if(node.kind==="text"){
    const lf=au.leaves[node.id]||{};const hasNote=(lf.note||"").trim().length>0;
    return `<div class="leafblock">
      <div class="leafhead"><div><b>${node.label}</b>${node.hint?`<div class="tiny muted">${node.hint}</div>`:""}</div>
        <button class="btn sm ghost" data-act="toggle-note" data-id="${node.id}" ${ro?"disabled":""} title="Commentaire" style="color:${hasNote?"var(--clay)":"var(--ink-mute)"}"><i data-lucide="message-square-plus"></i></button></div>
      <textarea class="in" rows="3" data-k="leaftext" data-leaf="${node.id}" data-f="text" placeholder="Texte libre…" ${ro?"disabled":""}>${esc(lf.text||"")}</textarea>
      ${noteOpen?`<div class="fade" style="margin-top:8px"><textarea class="in" rows="2" data-k="leaftext" data-leaf="${node.id}" data-f="note" placeholder="Commentaire complémentaire…" ${ro?"disabled":""}>${esc(lf.note||"")}</textarea></div>`:""}</div>`;
  }
  const lf=au.leaves[node.id]||{rows:[],note:""};const rows=lf.rows||[];
  const hasNote=(lf.note||"").trim().length>0;
  const noteCell=r=>`<input class="in note numin" type="number" min="0" max="10" step="0.5" data-k="row" data-leaf="${node.id}" data-row="${r.id}" data-f="note" value="${r.note??""}" placeholder="/10" title="Note du salarié sur ce point (/10)" ${ro?"disabled":""}>`;
  const delCell=r=>ro?"":`<button class="btn sm danger ghost" data-act="del-row" data-leaf="${node.id}" data-row="${r.id}"><i data-lucide="x"></i></button>`;
  const head=(label,total)=>`<div class="leafhead"><div><b>${node.label}</b>${node.kpi?` <span class="pill" style="background:var(--clay-soft);color:var(--clay-d)">KPI</span>`:""}${node.hint?`<div class="tiny muted">${node.hint}</div>`:""}</div>
      <div style="display:flex;align-items:center;gap:10px;white-space:nowrap">${total!=null?`<span class="tiny muted">Total <b id="total-${node.id}" style="color:var(--ink);font-size:13px">${total}</b></span>`:""}
        <button class="btn sm ghost" data-act="toggle-note" data-id="${node.id}" ${ro?"disabled":""} title="Commentaire général" style="color:${hasNote?"var(--clay)":"var(--ink-mute)"}"><i data-lucide="message-square-plus"></i></button></div></div>`;
  const addBtn=ro?"":`<button class="btn sm" data-act="add-row" data-leaf="${node.id}" style="margin-top:2px"><i data-lucide="user-plus"></i> Ajouter un salarié</button>`;
  const noteBox=noteOpen?`<div class="fade" style="margin-top:10px"><textarea class="in" rows="2" data-k="leafnote" data-leaf="${node.id}" placeholder="Commentaire général sur ce point…" ${ro?"disabled":""}>${esc(lf.note||"")}</textarea></div>`:"";

  /* ---- CALC leaf (ex: Contacts HS) : valeur calculée automatiquement, lecture seule ---- */
  if(node.kind==="calc"){
    return `<div class="leafblock">${head(null,null)}<div id="calc-${node.id}">${hsLeafBody(au)}</div>${noteBox}</div>`;
  }

  /* ---- QUAL leaf (ex: Fiche découverte) : salarié + note/10 + commentaire, pas de quantité ---- */
  if(node.kind==="qual"){
    const rowsHTML=rows.length?rows.map(r=>`
     <div class="rowline">
       <select class="in emp" data-k="row" data-leaf="${node.id}" data-row="${r.id}" data-f="empId" ${ro?"disabled":""}>${empOptions(r.empId)}</select>
       ${noteCell(r)}
       <input class="in cmt" data-k="row" data-leaf="${node.id}" data-row="${r.id}" data-f="comment" value="${esc(r.comment||"")}" placeholder="qualité de la découverte (commentaire)…" ${ro?"disabled":""}>
       ${delCell(r)}
     </div>`).join("")
     :`<div class="tiny muted" style="margin-bottom:6px">Aucune saisie. Ajoute un salarié pour juger la qualité de sa découverte client.</div>`;
    return `<div class="leafblock">${head(node.label,null)}${rowsHTML}${addBtn}${noteBox}</div>`;
  }

  /* ---- MULTI leaf (ex: RDV pris) : salarié + colonnes (R1/R2/R3/Sign) + note/10 + commentaire ---- */
  if(node.kind==="multi"){
    const cols=node.cols||[];
    const tot=cols.map(c=>rows.reduce((s,r)=>s+(Number(r.vals&&r.vals[c.key])||0),0));
    const colHead=rows.length?`<div class="rowline mhead"><span class="emp tiny mlab">Salarié</span>${cols.map((c,i)=>`<span class="mcol tiny mlab">${c.label}<br><b id="mtot-${node.id}-${c.key}" style="color:var(--ink)">${tot[i]}</b></span>`).join("")}<span class="note tiny mlab">/10</span><span class="cmt tiny mlab">Commentaire</span></div>`:"";

       ${cols.map(c=>`<input class="in mcol numin" type="number" data-k="mval" data-leaf="${node.id}" data-row="${r.id}" data-col="${c.key}" value="${(r.vals&&r.vals[c.key])??""}" placeholder="0" ${ro?"disabled":""}>`).join("")}
       ${noteCell(r)}
       <input class="in cmt" data-k="row" data-leaf="${node.id}" data-row="${r.id}" data-f="comment" value="${esc(r.comment||"")}" placeholder="commentaire…" ${ro?"disabled":""}>
       ${delCell(r)}
     </div>`).join("")
     :`<div class="tiny muted" style="margin-bottom:6px">Aucune saisie. Ajoute un salarié pour renseigner ses R1 / R2 / R3 / signatures.</div>`;
    return `<div class="leafblock">${head(node.label,null)}${rowsHTML}${addBtn}${noteBox}</div>`;
  }

  /* ---- NUM leaf (défaut) : salarié + quantité + note/10 + commentaire ---- */
  const total=rows.reduce((s,r)=>s+(Number(r.val)||0),0);
  const rowsHTML=rows.length?rows.map(r=>`
     <div class="rowline">
       <select class="in emp" data-k="row" data-leaf="${node.id}" data-row="${r.id}" data-f="empId" ${ro?"disabled":""}>${empOptions(r.empId)}</select>
       <input class="in val numin" type="number" data-k="row" data-leaf="${node.id}" data-row="${r.id}" data-f="val" value="${r.val??""}" placeholder="0" title="Quantité" ${ro?"disabled":""}>
       ${noteCell(r)}
       <input class="in cmt" data-k="row" data-leaf="${node.id}" data-row="${r.id}" data-f="comment" value="${esc(r.comment||"")}" placeholder="commentaire (lié au salarié)…" ${ro?"disabled":""}>
       ${delCell(r)}
     </div>`).join("")
   :`<div class="tiny muted" style="margin-bottom:6px">Aucune saisie. Ajoute un salarié (ou « non attribué ») pour renseigner un chiffre.</div>`;
  return `<div class="leafblock">${head(node.label,total)}${rowsHTML}${addBtn}${noteBox}</div>`;
}
function auditNodeHTML(node,depth,au,ro){
  if(node.children){

/* ============================== FIELD BINDING ============================== */
function writeField(el){
  const k=el.dataset.k;if(!k)return false;const a=currentAgency();if(!a)return false;
  if(k==="agency"){a[el.dataset.f]=el.value;}
  else if(k==="obj"){a.objectives=a.objectives||{};a.objectives[el.dataset.f]=el.value===""?"":Number(el.value);}
  else if(k==="emp"){const e=a.employees.find(x=>x.id===el.dataset.id);if(e)e[el.dataset.f]=el.value;}
  else{const au=currentAudit();if(!au)return false;
    if(k==="auditdate"){au.date=el.value;}
    else if(k==="note"){au.note=el.value===""?"":Number(el.value);}
    else if(k==="rating"){au.empRatings=au.empRatings||{};const id=el.dataset.id;au.empRatings[id]=au.empRatings[id]||{};au.empRatings[id][el.dataset.f]=el.dataset.f==="note"?(el.value===""?"":Number(el.value)):el.value;}
    else if(k==="leaftext"){const lf=ensureLeaf(au,el.dataset.leaf);lf[el.dataset.f]=el.value;}
    else if(k==="leafnote"){const lf=ensureLeaf(au,el.dataset.leaf);lf.note=el.value;}
    else if(k==="row"){const lf=ensureLeaf(au,el.dataset.leaf);const r=(lf.rows||[]).find(x=>x.id===el.dataset.row);if(r){const f=el.dataset.f;r[f]=(f==="val"||f==="note")?(el.value===""?"":Number(el.value)):el.value;}}
    else if(k==="mval"){const lf=ensureLeaf(au,el.dataset.leaf);const r=(lf.rows||[]).find(x=>x.id===el.dataset.row);if(r){r.vals=r.vals||{};r.vals[el.dataset.col]=el.value===""?"":Number(el.value);}}
    else return false;}
  scheduleSave();return true;
}

async function importBackup(file){

function reportLeaf(a,au,node){
  const lf=(au.leaves||{})[node.id];
  if(node.kind==="text"){const t=(lf&&lf.text)||"",n=(lf&&lf.note)||"";return `<div class="pr-leaf"><div class="pr-lt">${esc(node.label)}</div><div>${t?esc(t):"<span class='pr-mut'>—</span>"}</div>${n?`<div class="pr-note">Commentaire : ${esc(n)}</div>`:""}</div>`;}
  if(node.kind==="calc"){const total=computeHS(au,null);const per=(a.employees||[]).map(e=>({e,v:computeHS(au,e.id)})).filter(x=>leafTotalEmp(au,"cli.contact.entrant",x.e.id)||leafTotalEmp(au,"cli.contact.traite",x.e.id)||leafTotalEmp(au,"cli.contact.relance",x.e.id));
    return `<div class="pr-leaf"><div class="pr-lt">${esc(node.label)} : <b>${total}</b> <span class="pr-mut">(entrants − traités − à relancer)</span></div>${per.length?`<table class="pr-tb"><tr><th>Salarié</th><th>HS</th></tr>${per.map(x=>`<tr><td>${esc(empName(a,x.e.id))}</td><td>${x.v}</td></tr>`).join("")}</table>`:""}</div>`;}
  const rows=(lf&&lf.rows)||[];
  if(!rows.length)return `<div class="pr-leaf"><div class="pr-lt">${esc(node.label)}</div><div class="pr-mut">—</div></div>`;
  if(node.kind==="multi"){const cols=node.cols||[];return `<div class="pr-leaf"><div class="pr-lt">${esc(node.label)}</div><table class="pr-tb"><tr><th>Salarié</th>${cols.map(c=>`<th>${esc(c.label)}</th>`).join("")}<th>/10</th><th>Commentaire</th></tr>${rows.map(r=>`<tr><td>${esc(empName(a,r.empId))}</td>${cols.map(c=>`<td>${(r.vals&&r.vals[c.key])??""}</td>`).join("")}<td>${r.note??""}</td><td>${esc(r.comment||"")}</td></tr>`).join("")}</table></div>`;}
  if(node.kind==="qual"){return `<div class="pr-leaf"><div class="pr-lt">${esc(node.label)}</div><table class="pr-tb"><tr><th>Salarié</th><th>/10</th><th>Commentaire</th></tr>${rows.map(r=>`<tr><td>${esc(empName(a,r.empId))}</td><td>${r.note??""}</td><td>${esc(r.comment||"")}</td></tr>`).join("")}</table></div>`;}
  const total=rows.reduce((s,r)=>s+(Number(r.val)||0),0);
  return `<div class="pr-leaf"><div class="pr-lt">${esc(node.label)} <span class="pr-mut">(total ${total})</span></div><table class="pr-tb"><tr><th>Salarié</th><th>Quantité</th><th>/10</th><th>Commentaire</th></tr>${rows.map(r=>`<tr><td>${esc(empName(a,r.empId))}</td><td>${r.val??""}</td><td>${r.note??""}</td><td>${esc(r.comment||"")}</td></tr>`).join("")}</table></div>`;
}
function reportSection(a,au,node){if(node.children)return `<div class="pr-section"><div class="pr-st">${esc(node.label)}</div>${node.children.map(c=>reportSection(a,au,c)).join("")}</div>`;return reportLeaf(a,au,node);}
function auditReportHTML(a,au){
  const k=computeKpis(au),ns=noteStats(au),ag=computeRatios(au,null),pf=v=>v==null?"—":v.toFixed(1)+"%";
  const ratios=`<table class="pr-tb"><tr><th>Ratio</th><th>Valeur</th></tr><tr><td>Traités / entrants</td><td>${pf(ag.r_traite)}</td></tr><tr><td>RDV / entrants</td><td>${pf(ag.r_rdv)}</td></tr><tr><td>Signatures / entrants</td><td>${pf(ag.r_sign)}</td></tr><tr><td>Signatures / R1</td><td>${pf(ag.r_sign_r1)}</td></tr><tr><td>Résiliations / signatures</td><td>${pf(ag.r_resil)}</td></tr><tr><td>HS / entrants</td><td>${pf(ag.r_hs)}</td></tr></table>`;
  const perEmp=(a.employees||[]).filter(e=>ns.emp[e.id]).map(e=>`<tr><td>${esc(e.name||"(sans nom)")}</td><td>${ns.emp[e.id].avg.toFixed(1)}/10</td><td>${ns.emp[e.id].count}</td></tr>`).join("");
  const stLabel=au.status==="validated"?"Validé":au.status==="archived"?"Archivé":"Brouillon";
  return `<div class="pr-doc">
    <div class="pr-head"><div><div class="pr-title">${esc(a.name||"Agence")}</div><div class="pr-mut">${esc(a.address||"")}</div></div>
      <div style="text-align:right"><div style="font-weight:700">Audit du ${fmtDate(au.date)}</div><div class="pr-mut">${stLabel}</div></div></div>
    <table class="pr-tb" style="margin-bottom:14px"><tr><th>Contacts entrants</th><th>Signatures</th><th>Résiliations</th><th>Taux transfo.</th><th>Note agence</th></tr>
      <tr><td>${k.entrant}</td><td>${k.signatures}</td><td>${k.ccmi}</td><td>${k.transfo.toFixed(1)}%</td><td>${ns.agency==null?"—":ns.agency.toFixed(1)+"/10"}</td></tr></table>
    ${AUDIT.map(s=>reportSection(a,au,s)).join("")}
    <div class="pr-section"><div class="pr-st">Ratios de conversion (agence)</div>${ratios}</div>
    <div class="pr-section"><div class="pr-st">Notes des salariés</div>${perEmp?`<table class="pr-tb"><tr><th>Salarié</th><th>Moyenne</th><th>Points notés</th></tr>${perEmp}</table>`:`<div class="pr-mut">Aucune note saisie.</div>`}</div>
    <div class="pr-foot">Document généré le ${fmtDate(todayISO())} · Réseau Audit</div></div>`;
}
function exportAuditPDF(){
  const a=currentAgency(),au=currentAudit();if(!a||!au)return;
  const root=document.getElementById("print-root");if(!root)return;
  root.innerHTML=auditReportHTML(a,au);
  const oldTitle=document.title;document.title="Audit "+(a.name||"agence").replace(/[^\w\-]+/g,"_")+"_"+au.date;
  document.body.classList.add("printing");
  const cleanup=()=>{document.body.classList.remove("printing");root.innerHTML="";document.title=oldTitle;window.removeEventListener("afterprint",cleanup);};
  window.addEventListener("afterprint",cleanup);
  setTimeout(()=>{window.print();setTimeout(cleanup,1500);},60);
}

document.body.addEventListener("click",e=>{
  const t=e.target.closest("[data-act]");if(!t)return;const act=t.dataset.act,id=t.dataset.id,a=currentAgency();
  switch(act){
    case"nav-network":state.route={view:"network",id:null};renderApp();break;
    case"nav-agency":{state.route={view:"agency",id};state.tab="synthese";state.auditEdit=false;state.auditId=defaultAuditId(state.agencies.find(x=>x.id===id));renderApp();break;}
    case"open-settings":openSettings();break;
    case"export-backup":exportBackup();break;
    case"import-backup":{const fb=document.getElementById("file-backup");if(fb)fb.click();break;}
    case"close-modal":closeModal();break;
    case"close-modal-bg":if(e.target.classList.contains("modal-bg"))closeModal();break;
    case"add-agency":{const c=addAgencies(["Nouvelle agence"]);state.route={view:"agency",id:c[0].id};state.tab="synthese";state.auditId=null;renderApp();break;}
    case"bulk-add":{const names=(state.bulk||"").split("\n").map(s=>s.trim()).filter(Boolean);if(names.length)addAgencies(names);state.bulk="";closeModal();renderApp();break;}
    case"tab":state.tab=t.dataset.tab;state.auditEdit=false;renderContent();break;
    case"synthview":state.synthView=t.dataset.view;renderContent();break;
    case"toggle-section":if(state.closed.has(id))state.closed.delete(id);else state.closed.add(id);renderContent();break;
    case"toggle-note":if(state.openNotes.has(id))state.openNotes.delete(id);else state.openNotes.add(id);renderContent();break;
    case"new-audit":{a.audits=a.audits||[];const au={id:uid(),date:newAuditDate(),status:"draft",leaves:{},empRatings:{},note:""};a.audits.push(au);state.ym=au.date.slice(0,7);state.auditId=au.id;state.auditEdit=false;state.auditExpanded.add(au.id);scheduleSave();renderApp();break;}
    case"validate-audit":{const au=currentAudit();if(au)au.status="validated";scheduleSave();renderContent();break;}
    case"reopen-audit":{const au=currentAudit();if(au)au.status="draft";scheduleSave();renderContent();break;}
    case"archive-audit":{const au=currentAudit();if(au)au.status="archived";scheduleSave();renderContent();break;}
    case"unarchive-audit":{const au=currentAudit();if(au)au.status="validated";scheduleSave();renderContent();break;}
    case"open-edit":{state.auditId=id;state.auditEdit=true;renderContent();break;}
    case"audit-list":{state.auditEdit=false;renderContent();break;}
    case"toggle-audit-exp":{if(state.auditExpanded.has(id))state.auditExpanded.delete(id);else state.auditExpanded.add(id);renderContent();break;}
    case"pdf-audit":{state.auditId=id;exportAuditPDF();break;}
    case"toggle-arch":state.archOpen=!state.archOpen;renderContent();break;
    case"export-pdf":exportAuditPDF();break;
    case"del-audit":confirmDelAudit(id);break;
    case"do-del-audit":doDelAudit(id);break;
    case"add-row":{const au=currentAudit();const leaf=t.dataset.leaf;const lf=ensureLeaf(au,leaf);lf.rows=lf.rows||[];const row={id:uid(),empId:"",note:"",comment:""};if(LEAFKIND[leaf]==="multi")row.vals={};else if(LEAFKIND[leaf]!=="qual")row.val="";lf.rows.push(row);scheduleSave();renderContent();break;}
    case"del-row":{const au=currentAudit();const lf=ensureLeaf(au,t.dataset.leaf);lf.rows=(lf.rows||[]).filter(r=>r.id!==t.dataset.row);scheduleSave();renderContent();break;}
    case"reprendre-note":{const au=currentAudit();if(au)au.note=Number(t.dataset.val);scheduleSave();renderContent();break;}
    case"add-emp":{a.employees.push({id:uid(),name:"",role:""});scheduleSave();renderContent();break;}
    case"del-emp":{a.employees=a.employees.filter(x=>x.id!==id);scheduleSave();renderContent();break;}
    case"star":{const au=currentAudit();if(!au)break;au.empRatings=au.empRatings||{};const val=Number(t.dataset.val),eid=t.dataset.emp;au.empRatings[eid]=au.empRatings[eid]||{};const cur=Number(au.empRatings[eid].note);au.empRatings[eid].note=cur===val?val-1:val;scheduleSave();renderContent();break;}
    case"import-image":document.getElementById("file-img").click();break;
    case"import-excel":document.getElementById("file-xls").click();break;
    case"open-doc":openDoc(id);break;
    case"del-doc":confirmDelDoc(id);break;
    case"do-del-doc":doDelDoc(id);break;
  }
});

/* ============================== BOOT ============================== */
(async function(){
  const d=await loadData();
  if(d){const m=migrate(d);state.agencies=m.agencies;state.settings=m.settings;scheduleSave();}
  renderApp();
})();
</script>
