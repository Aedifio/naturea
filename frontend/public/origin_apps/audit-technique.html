<!DOCTYPE html>
<html lang="fr">
<head>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Black&display=swap" rel="stylesheet">
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Audit Chantier – Maisons Naturea</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@87..125,300..900&family=Archivo+Black&display=swap" rel="stylesheet"/>
<style>
:root{
  /* Fonds — palette crème/naturelle */
  --bg:#f7f4ec;          /* crème principal (papier kraft clair) */
  --bg2:#ffffff;         /* cartes — blanc pur */
  --bg3:#f0ebdf;         /* zones secondaires (inputs, hovers) */
  --bg4:#e6dfce;         /* zones actives, accents subtils */
  --border:#e3dccc;      /* bordures douces */
  --border2:#cfc6b2;     /* bordures hover */

  /* Textes */
  --text:#1f2e25;        /* vert très foncé (presque noir, naturel) */
  --text2:#4f5f56;       /* texte secondaire */
  --text3:#8a948c;       /* texte tertiaire / labels */

  /* Vert Naturéa — couleur signature OFFICIELLE */
  --primary:#355222;     /* vert sapin Naturéa (couleur officielle du logo) */
  --primary-d:#243919;   /* vert plus profond (hover) */
  --primary-l:#4a6e34;   /* vert plus clair (secondaire) */
  --primary-soft:#e2e8da;/* vert très doux (fond actif) */

  /* Bois & accents — terracotta Naturéa officiel */
  --wood:#d69362;        /* terracotta Naturéa (couleur du toit) */
  --wood-d:#b87648;      /* terracotta foncé */
  --wood-l:#e6b18a;      /* terracotta clair */
  --sage:#a8bca0;        /* vert sauge complémentaire */

  /* Sémantique — accordée à la charte */
  --green:#2f8557;       /* validé / excellent */
  --amber:#c98f37;       /* attention / mineur */
  --red:#b8453d;         /* urgent / critique */
  --blue:#3d6b8a;        /* info / conseil */
  --orange:#c5703d;      /* alerte */

  /* Typo — Archivo (la police du logo Naturéa) partout */
  --mono:'Archivo', system-ui, sans-serif;        /* avec font-feature-settings tnum pour chiffres alignés */
  --sans:'Archivo', system-ui, -apple-system, sans-serif;
  --display:'Archivo Black', 'Archivo', sans-serif; /* pour les gros titres en mode logo */
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--primary-l)}
input,textarea,select{background:#fff;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 13px;font-family:var(--sans);font-size:13px;width:100%;outline:none;transition:border-color .15s, box-shadow .15s}
input:focus,textarea:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(53,82,34,.12)}
textarea{resize:vertical;min-height:80px;line-height:1.6}
button{cursor:pointer;font-family:var(--sans);border:none;background:none;transition:all .15s}
.mono{font-family:var(--sans);font-variant-numeric:tabular-nums;font-feature-settings:'tnum' 1,'lnum' 1;font-weight:600}
[style*="var(--mono)"]{font-variant-numeric:tabular-nums;font-feature-settings:'tnum' 1}

/* LAYOUT */
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:relative}
.sidebar-logo{padding:0;border-bottom:1px solid var(--border);background:#355222;display:block}
.sidebar-logo .brand-banner{width:100%;height:auto;display:block}
.sidebar-subtitle{padding:14px 22px 12px;font-size:10px;color:var(--text3);font-family:var(--sans);letter-spacing:1.6px;text-transform:uppercase;font-weight:800;border-bottom:1px solid var(--border);background:#fff}
.sidebar-logo h1{font-family:var(--display);font-size:17px;font-weight:600;color:var(--text);letter-spacing:-.4px;line-height:1.05;font-style:normal}
.sidebar-logo h1 em{font-style:italic;font-weight:500;color:var(--primary)}
.sidebar-logo p{font-size:10px;color:var(--text3);margin-top:3px;font-family:var(--mono);letter-spacing:1.2px;text-transform:uppercase}
.sidebar-nav{flex:1;padding:14px 12px;overflow-y:auto}
.nav-section{font-size:10px;font-weight:800;color:var(--text3);letter-spacing:1.6px;text-transform:uppercase;padding:10px 10px 6px;font-family:var(--sans)}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;color:var(--text2);font-size:13px;width:100%;text-align:left;cursor:pointer;border:none;background:none;transition:all .15s;margin-bottom:1px;font-weight:500}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--primary-soft);color:var(--primary-d);font-weight:700}
.nav-item .dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
.nav-item .score-badge{margin-left:auto;font-family:var(--sans);font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;font-variant-numeric:tabular-nums}
.main{flex:1;overflow-y:auto;background:var(--bg)}

/* TOPBAR */
.topbar{padding:22px 32px 0;display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.topbar h2{font-family:var(--display);font-size:24px;font-weight:900;color:var(--text);letter-spacing:-.3px;line-height:1.15;text-transform:uppercase}
.topbar-actions{display:flex;gap:10px}
.btn{padding:9px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .15s;letter-spacing:.2px;display:inline-flex;align-items:center;gap:6px;text-transform:uppercase;font-size:11.5px}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 1px 0 rgba(255,255,255,.15) inset, 0 4px 10px -4px rgba(53,82,34,.5)}
.btn-primary:hover{background:var(--primary-d);transform:translateY(-1px)}
.btn-ghost{background:#fff;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);background:var(--bg3)}
.btn-danger{background:rgba(184,69,61,.08);color:var(--red);border:1px solid rgba(184,69,61,.25)}
.btn-danger:hover{background:rgba(184,69,61,.15)}

/* CONTENT */
.content{padding:0 32px 48px}

/* CARDS */
.card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:22px 24px;box-shadow:0 1px 2px rgba(31,46,37,.03)}
.card-sm{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 18px}

/* GRID */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* METRIC CARD */
.metric{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px 22px;position:relative;overflow:hidden}
.metric::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--primary-l));opacity:.6}
.metric-label{font-size:10px;color:var(--text3);font-family:var(--sans);letter-spacing:1.4px;text-transform:uppercase;margin-bottom:10px;font-weight:700}
.metric-value{font-family:var(--display);font-size:34px;font-weight:900;line-height:1;letter-spacing:-1px;font-variant-numeric:tabular-nums}
.metric-sub{font-size:12px;color:var(--text2);margin-top:8px;font-weight:500}

/* TABLE */
.table{width:100%;border-collapse:collapse}
.table th{font-size:10px;font-weight:800;color:var(--text2);letter-spacing:1.2px;text-transform:uppercase;padding:11px 14px;text-align:left;border-bottom:1px solid var(--border);background:var(--bg3);font-family:var(--sans)}
.table td{padding:13px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:top}
.table tr:last-child td{border-bottom:none}
.table tbody tr{transition:background .12s}
.table tbody tr:hover td{background:var(--bg3)}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.2px;font-variant-numeric:tabular-nums}
.badge-red{background:rgba(184,69,61,.1);color:var(--red);border:1px solid rgba(184,69,61,.25)}
.badge-amber{background:rgba(201,143,55,.1);color:var(--amber);border:1px solid rgba(201,143,55,.25)}
.badge-green{background:rgba(47,133,87,.1);color:var(--green);border:1px solid rgba(47,133,87,.25)}
.badge-blue{background:rgba(61,107,138,.1);color:var(--blue);border:1px solid rgba(61,107,138,.25)}
.badge-gray{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}

/* SCORE PILL */
.score-pill{display:inline-flex;align-items:center;font-family:var(--sans);font-size:12px;font-weight:700;padding:3px 10px;border-radius:6px;font-variant-numeric:tabular-nums}

/* RING SVG */
.ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}

/* ÉCART URGENTS TABLE */
.urgent-row{display:grid;grid-template-columns:1fr 160px 160px 140px;gap:0;border-bottom:1px solid var(--border)}
.urgent-row:last-child{border-bottom:none}
.urgent-cell{padding:14px 16px;font-size:13px}

/* FORM */
.form-row{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.form-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;font-family:var(--sans)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* SECTION TITLE */
.section-title{font-size:11px;font-weight:800;color:var(--text2);letter-spacing:1.6px;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-family:var(--sans)}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* PROGRESS BAR */
.progress{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}

/* ANIM */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .25s ease forwards}

/* RECTIF STATUS */
.rectif-select{padding:5px 10px;border-radius:6px;font-size:12px;font-weight:500;border:1px solid var(--border);background:#fff;color:var(--text);width:auto;min-width:140px}

/* EMPTY */
.empty{text-align:center;padding:40px;color:var(--text3);font-size:13px;font-style:italic}

/* MOBILE TOGGLE */
.menu-toggle{display:none;position:fixed;top:14px;left:14px;z-index:60;width:42px;height:42px;background:#fff;border:1px solid var(--border);border-radius:10px;align-items:center;justify-content:center;color:var(--primary);box-shadow:0 4px 12px -4px rgba(31,46,37,.15)}
.menu-toggle svg{width:20px;height:20px}
.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(31,46,37,.4);z-index:40;backdrop-filter:blur(2px)}

/* RESPONSIVE */
@media(max-width:1100px){
  .grid-4{grid-template-columns:repeat(2,1fr)}
  .urgent-row{grid-template-columns:1fr 130px 130px 120px}
}
@media(max-width:900px){
  .sidebar{position:fixed;top:0;left:0;height:100vh;z-index:50;transform:translateX(-100%);transition:transform .25s ease;width:260px;box-shadow:0 0 32px rgba(31,46,37,.15)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-backdrop.show{display:block}
  .menu-toggle{display:inline-flex}
  .topbar{padding:18px 20px 0 70px;margin-bottom:18px}
  .topbar h2{font-size:22px}
  .content{padding:0 20px 32px}
  .grid-3{grid-template-columns:1fr}
  .grid-2{grid-template-columns:1fr!important}
}
@media(max-width:640px){
  .grid-4{grid-template-columns:1fr 1fr;gap:10px}
  .metric{padding:16px 16px}
  .metric-value{font-size:26px}
  .card{padding:18px 16px;border-radius:12px}
  .form-grid{grid-template-columns:1fr}
  .topbar h2{font-size:19px}
  .table th,.table td{padding:9px 10px;font-size:12px}
  .urgent-row{grid-template-columns:1fr}
  .btn{padding:9px 13px;font-size:12.5px}
}

/* ============================================================
   CHARTE GRAPHIQUE NATURÉA — source : Plaquette commerciale V10
   Vert du logo #41532A (accent principal) · Terracotta #D69362 (secondaire)
   Police Archivo (substitut de Gopher)
   ============================================================ */
:root{
  /* Fonds & neutres */
  --bg:#FBFAF5!important; --paper:#FBFAF5!important; --paper2:#FFFFFF!important;
  --surface:#FFFFFF!important; --white:#FFFFFF!important; --card:#FFFFFF!important; --bg4:#FFFFFF!important;
  --surface-alt:#F2EDE3!important; --cream:#F2EDE3!important; --sand:#F2EDE3!important; --sand2:#E9E1D1!important;
  --mist:#F6F2E9!important; --faint:#F6F2E9!important; --bg2:#F2EDE3!important; --bg3:#E9E1D1!important;
  --ink:#1E2A18!important; --text:#1E2A18!important; --ink2:#2E3A26!important; --ink3:#46503C!important;
  --text2:#46503C!important; --text3:#5E6B4F!important; --ink-soft:#46503C!important; --ink-mute:#9BA889!important;
  --muted:#5E6B4F!important; --subtle:#9BA889!important;
  --border:#E2DCCD!important; --border2:#EDE7DA!important; --border-strong:#D8D0BC!important;
  --line:#E2DCCD!important; --line2:#EDE7DA!important;
  /* Accent PRINCIPAL = VERT DU LOGO #41532A (toutes les variantes "primaire") */
  --accent:#41532A!important; --accent-soft:#EAEFE0!important; --accent-ink:#38471F!important;
  --primary:#41532A!important; --primary-l:#556B36!important; --primary-d:#38471F!important; --primary-soft:#EAEFE0!important;
  --forest:#41532A!important; --forest2:#38471F!important;
  --gold:#41532A!important; --gold2:#38471F!important; --gold3:#EAEFE0!important;
  --blue:#41532A!important; --blue-dark:#38471F!important; --blue-light:#EAEFE0!important;
  --clay:#41532A!important; --clay-d:#38471F!important; --clay-soft:#EAEFE0!important;
  --green:#41532A!important; --green-soft:#EAEFE0!important; --ok:#41532A!important;
  /* Accent SECONDAIRE = ORANGE DU LOGO #D69362 */
  --wood:#D69362!important; --wood-soft:#F6E7D7!important; --wood-ink:#B87648!important;
  --wood-l:#E2A982!important; --wood-d:#B87648!important;
  --orange:#D69362!important; --orange-dark:#B87648!important;
  --terra:#D69362!important; --terra2:#B87648!important;
  --petrol:#D69362!important; --petrol-soft:#F6E7D7!important;
  --purple:#D69362!important;
  /* Olive / sauge (tertiaire) */
  --sage:#839049!important; --sage2:#6B7A3A!important; --yellow:#C68B2C!important;
  /* Sémantique */
  --warn:#C68B2C!important; --amber:#C68B2C!important; --amber-soft:#F7ECD7!important;
  --danger:#B8453D!important; --red:#B8453D!important; --red-soft:#F5DEDC!important;
  /* Familles de police */
  --sans:'Archivo',system-ui,-apple-system,sans-serif!important;
  --serif:'Archivo','Archivo Black',system-ui,sans-serif!important;
  --display:'Archivo','Archivo Black',system-ui,sans-serif!important;
  --mono:'Archivo',ui-monospace,'SF Mono',Consolas,monospace!important;
}
html, body, button, input, select, textarea, p, span, td, th, li, a, label, div, small, strong, b {
  font-family:'Archivo',system-ui,-apple-system,sans-serif!important;
}
h1, h2, h3, h4, h5, h6,
.disp, .kpibig, .brand, .page-title, .kpi-v, .stat-v, [class*="title"], [class*="kpi-v"] {
  font-family:'Archivo','Archivo Black',system-ui,sans-serif!important;
  font-weight:800!important; letter-spacing:-0.01em!important;
}
code, pre, .mono, [class*="mono"] {
  font-family:'Archivo',ui-monospace,'SF Mono',Consolas,monospace!important;
}
/* === FIN CHARTE NATURÉA === */
</style>

<script>
/* ── DATA ── */
const CORPS=[{id:1,code:"01",label:"Implantation / Terrassement"},{id:2,code:"02",label:"Maçonnerie Infrastructure"},{id:3,code:"03",label:"MOB (Murs Ossature Bois)"},{id:4,code:"04",label:"Fermettes Industrielles"},{id:5,code:"05",label:"Charpente Trad. & Bois Ext."},{id:6,code:"06",label:"Couverture / Zinguerie"},{id:7,code:"07",label:"Fumisterie"},{id:8,code:"08",label:"Menuiseries Extérieures"},{id:9,code:"09",label:"Plâtrerie / Isolation"},{id:10,code:"10",label:"Ventilation"},{id:11,code:"11",label:"Menuiseries Intérieures"},{id:12,code:"12",label:"Carrelages / Faïences"},{id:13,code:"13",label:"Plomberie / Chauffage / Élec."},{id:14,code:"14",label:"ECTIS / Ravalement"},{id:15,code:"15",label:"Branchements / Assainissement"},{id:16,code:"16",label:"Conception Générale & Divers"}];
const ECARTS=[{value:"urgent",label:"Écart urgent",color:"#b8453d"},{value:"mineur",label:"Écart mineur",color:"#c98f37"},{value:"corrige",label:"Corrigé ✓",color:"#2f8557"},{value:"conseil",label:"Conseil",color:"#3d6b8a"},{value:"nvu",label:"Non vu",color:"#8a948c"}];
const RECTIF_STATUS=[{value:"en_attente",label:"En attente",color:"#c98f37"},{value:"en_cours",label:"En cours",color:"#3d6b8a"},{value:"corrige",label:"Corrigé",color:"#2f8557"},{value:"reporte",label:"Reporté",color:"#8a948c"}];
const AGENCES_DEF=[{id:1,nom:"BOISILIA CONSTRUCTION",ville:"VILLEFRANCHE SUR SAÔNE",adresse:"277 rue d'Anse, 69400"},{id:2,nom:"TARN MAISON OSSATURE BOIS",ville:"ALBI",adresse:"4 rue du Foyer, 81600 BRENS"},{id:3,nom:"GP-MEOB",ville:"ANNECY / CHAMBÉRY",adresse:"2 rue Antoine Berthod, 74960"},{id:4,nom:"SARL LBROS",ville:"ARRAS",adresse:"Za Carrefour de l'Artois, 62490"},{id:5,nom:"ECOHOME 84",ville:"AVIGNON / REMOULINS",adresse:"31 rue des Portes de la Tapy, 84170"},{id:6,nom:"BUGEY BRESSE CONSTRUCTIONS",ville:"BOURG EN BRESSE",adresse:"Le centre village, 01250"},{id:7,nom:"ACVR HOME",ville:"CAEN",adresse:"ZA Calix rue Pasteur, 14120"},{id:8,nom:"LDPCA CONSTRUCTIONS",ville:"CAHORS",adresse:"15 bis Bd Gambetta, 46000"},{id:9,nom:"E.M.A CONSTRUCTION",ville:"CHOLET / LA ROCHE SUR YON",adresse:"50 rue Eugène Bremond, 49300"},{id:10,nom:"MGCE",ville:"ÉVRY",adresse:"85 route de Corbeil, 91700"},{id:11,nom:"CABINET APJ",ville:"MONTPELLIER",adresse:""},{id:12,nom:"SAS BERTRAND CONSTRUCTIONS",ville:"RENNES",adresse:"Za du Haut Danté, 35520"},{id:13,nom:"OB CONCEPT",ville:"RODEZ",adresse:"18 avenue de Bourran, 12000"},{id:14,nom:"EVABOIS",ville:"SALON DE PROVENCE",adresse:"46 chemin des Bastides, 13450"},{id:15,nom:"NATI BRETAGNE NORD",ville:"ST BRIEUC",adresse:"23 rue de l'Ic, 22590"},{id:16,nom:"NOGOT CONCEPT",ville:"TOURS",adresse:"ZA le Pilori, 37360"},{id:17,nom:"MO2B",ville:"VAR / TOULON",adresse:"210 rue de l'innovation, 83110"}];

/* ── STATE ── */
let STATE=loadState();
let VIEW={page:'dashboard',agenceId:null,auditId:null,panel:null,panelData:null};

function loadState(){
  try{const d=localStorage.getItem('naturea_pc_v1');if(d)return JSON.parse(d);}catch(e){}
  return{agences:AGENCES_DEF.map(a=>({...a,audits:[]}))};
}
function save(){try{localStorage.setItem('naturea_pc_v1',JSON.stringify(STATE));}catch(e){}}

/* ── HELPERS ── */
function sc(s){if(s===null||s===undefined)return'#8a948c';if(s>=4)return'#2f8557';if(s>=3)return'#c98f37';if(s>=2)return'#c5703d';return'#b8453d';}
function sl(s){if(s===null||s===undefined)return'—';if(s>=4)return'Excellent';if(s>=3)return'Satisfaisant';if(s>=2)return'À améliorer';return'Critique';}
function avgA(audits){if(!audits||!audits.length)return null;const sc2=audits.map(a=>{const it=a.corps.filter(c=>c.note!==null);if(!it.length)return null;return it.reduce((s,c)=>s+c.note,0)/it.length;}).filter(s=>s!==null);if(!sc2.length)return null;return sc2.reduce((a,b)=>a+b,0)/sc2.length;}
function auditAvg(a){const it=a.corps.filter(c=>c.note!==null);if(!it.length)return null;return it.reduce((s,c)=>s+c.note,0)/it.length;}
function fmtDate(d){if(!d)return'—';const p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function ring(score,size){
  size=size||48;const r=size*.36,cx=size/2,circ=2*Math.PI*r,pct=score!==null?score/5:0,col=sc(score);
  return`<svg width="${size}" height="${size}"><circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="#e6dfce" stroke-width="${(size*.1).toFixed(0)}"/>${score!==null?`<circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="${col}" stroke-width="${(size*.1).toFixed(0)}" stroke-dasharray="${(pct*circ).toFixed(1)} ${circ.toFixed(1)}" stroke-linecap="round" style="transform:rotate(-90deg);transform-origin:center"/>`:''}<text x="${cx}" y="${cx+1}" text-anchor="middle" dominant-baseline="middle" fill="${score!==null?col:'#8a948c'}" font-size="${(size*.28).toFixed(0)}" font-weight="900" font-family="'Archivo Black','Archivo',sans-serif" font-variant-numeric="tabular-nums">${score!==null?score.toFixed(1):'—'}</text></svg>`;
}
function scorePill(s){const col=sc(s);return`<span class="score-pill" style="background:${col}18;color:${col};border:1px solid ${col}30">${s!==null?s.toFixed(1)+'/5':'—'}</span>`;}

/* all urgent écarts across network */
function getAllUrgents(){
  const res=[];
  STATE.agences.forEach(ag=>{
    ag.audits.forEach(au=>{
      au.corps.forEach(c=>{
        if(c.ecart==='urgent'){
          res.push({agenceId:ag.id,agenceNom:ag.nom,agenceVille:ag.ville,auditId:au.id,auditDate:au.date,corpsId:c.id,corpsCode:c.code,corpsLabel:c.label,commentaire:c.commentaire,rectifStatus:c.rectifStatus||'en_attente',rectifNote:c.rectifNote||'',photos:c.photos||[]});
        }
      });
    });
  });
  return res.sort((a,b)=>b.auditDate.localeCompare(a.auditDate));
}

function updateRectif(agId,auditId,corpsId,field,val){
  const ag=STATE.agences.find(x=>x.id===agId);
  const au=ag.audits.find(x=>x.id===auditId);
  const c=au.corps.find(x=>x.id===corpsId);
  c[field]=val;
  save();
}

/* ── MAIN ROUTER ── */
function renderMain(){
  const mc=document.getElementById('main-content');
  if(VIEW.page==='dashboard') mc.innerHTML=renderDashboard();
  else if(VIEW.page==='urgents') mc.innerHTML=renderUrgents();
  else if(VIEW.page==='classement') mc.innerHTML=renderClassement();
  else if(VIEW.page==='agence') mc.innerHTML=renderAgence();
  else if(VIEW.page==='audit') mc.innerHTML=renderAuditDetail();
  else if(VIEW.page==='newAudit') mc.innerHTML=renderNewAudit();
  bindMain();
}

/* ── DASHBOARD ── */
function renderDashboard(){
  const all=STATE.agences.flatMap(a=>a.audits);
  const gs=avgA(all);
  const audited=STATE.agences.filter(a=>avgA(a.audits)!==null);
  const urgents=getAllUrgents();
  const open=urgents.filter(u=>u.rectifStatus!=='corrige');

  // Last 3 audited agences (by most recent audit date)
  const recentAg=[...STATE.agences]
    .filter(a=>a.audits.length>0)
    .map(a=>({...a,lastDate:a.audits.map(x=>x.date).sort().reverse()[0],score:avgA(a.audits)}))
    .sort((a,b)=>b.lastDate.localeCompare(a.lastDate))
    .slice(0,3);

  // Corps weaknesses
  const cmScores=CORPS.map(cm=>{const sc2=all.flatMap(a=>a.corps.filter(c=>c.id===cm.id&&c.note!==null).map(c=>c.note));return{...cm,avg:sc2.length?sc2.reduce((a,b)=>a+b,0)/sc2.length:null};}).filter(c=>c.avg!==null).sort((a,b)=>a.avg-b.avg);

  return`

/* ── NEW AUDIT (multi-step) ── */
let DRAFT={step:0,data:null};
function startNewAudit(agId){
  DRAFT={step:0,data:{id:Date.now(),date:new Date().toISOString().slice(0,10),auditeur:'',chantiers:'',participants:'',commentaires:'',corps:CORPS.map(cm=>({id:cm.id,code:cm.code,label:cm.label,note:null,ecart:null,commentaire:'',photos:[],rectifStatus:'en_attente',rectifNote:''}))}};
  VIEW.page='newAudit';VIEW.agenceId=agId;
  renderMain();
}

let ACTIVE_CORPS=null;

function renderNewAudit(){
  const ag=STATE.agences.find(x=>x.id===VIEW.agenceId);
  const d=DRAFT.data;
  const score=(()=>{const it=d.corps.filter(c=>c.note!==null);if(!it.length)return null;return it.reduce((s,c)=>s+c.note,0)/it.length;})();
  const steps=['Informations générales','Évaluation corps de métier','Résumé & validation'];

  if(ACTIVE_CORPS!==null){
    const c=d.corps.find(x=>x.id===ACTIVE_CORPS);
    return renderCorpsEditor(ag,c,score);
  }

  return`
<div class="topbar">
  <div>
    <button class="btn btn-ghost" style="margin-bottom:8px;font-size:12px" id="cancel-new">← Annuler</button>
    <h2>Nouvel audit — ${ag.nom}</h2>
  </div>
  ${ring(score,48)}
</div>
<div class="content fade-up">
  <!-- Steps indicator -->
  <div style="display:flex;gap:0;margin-bottom:28px;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:#fff">
    ${steps.map((s,i)=>`<div style="flex:1;padding:14px 16px;background:${i===DRAFT.step?'var(--primary-soft)':'#fff'};border-right:${i<2?'1px solid var(--border)':'none'};display:flex;align-items:center;gap:9px">
      <span style="width:22px;height:22px;border-radius:50%;background:${i<DRAFT.step?'var(--green)':i===DRAFT.step?'var(--primary)':'var(--bg4)'};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0">${i<DRAFT.step?'✓':i+1}</span>
      <span style="font-size:13px;color:${i===DRAFT.step?'var(--primary-d)':'var(--text2)'};font-weight:${i===DRAFT.step?600:500}">${s}</span>
    </div>`).join('')}
  </div>

  ${DRAFT.step===0?renderStep0Form(d):''}
  ${DRAFT.step===1?renderStep1List(d):''}
  ${DRAFT.step===2?renderStep2Summary(d,score):''}

  <div style="display:flex;justify-content:space-between;margin-top:24px">
    ${DRAFT.step>0?`<button class="btn btn-ghost" id="prev-step">← Étape précédente</button>`:`<div></div>`}
    ${DRAFT.step<2?`<button class="btn btn-primary" id="next-step">Étape suivante →</button>`:
    `<button class="btn btn-primary" id="save-audit" style="background:var(--green);color:#fff;font-weight:600">✓ Enregistrer l'audit</button>`}
  </div>
</div>`;
}

        <button id="add-photo" style="width:100%;background:var(--bg3);border:1.5px dashed var(--border2);border-radius:10px;padding:18px;color:var(--text2);font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:all .15s">📷 Ajouter une photo</button>
        <input type="file" id="photo-input" accept="image/*" style="display:none" multiple/>
        ${c.photos&&c.photos.length?`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">${c.photos.map((p,i)=>`<div style="position:relative"><img src="${p}" style="width:90px;height:90px;border-radius:8px;object-fit:cover;border:1px solid var(--border)"/><button data-dphoto="${i}" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;background:var(--red);border-radius:50%;color:#fff;font-size:11px;line-height:20px;text-align:center">×</button></div>`).join('')}</div>`:''}
      </div>
    </div>
  </div>
  <div style="display:flex;justify-content:flex-end;margin-top:20px">
    <button class="btn btn-primary" id="back-corps">Retour à la liste →</button>
  </div>
</div>`;
}

function renderStep0Form(d){return`
<div class="card">
  <div class="form-grid">
    <div class="form-row"><label class="form-label">Date de l'audit</label><input type="date" id="f-date" value="${d.date}"/></div>
    <div class="form-row"><label class="form-label">Auditeur</label><input type="text" id="f-auditeur" placeholder="Nom de l'auditeur" value="${d.auditeur}"/></div>
  </div>
  <div class="form-row"><label class="form-label">Chantiers visités</label><input type="text" id="f-chantiers" placeholder="Noms / références des chantiers visités" value="${d.chantiers}"/></div>
  <div class="form-row"><label class="form-label">Participants</label><input type="text" id="f-participants" placeholder="Personnes présentes lors de l'audit" value="${d.participants}"/></div>
  <div class="form-row" style="margin-bottom:0"><label class="form-label">Commentaires généraux</label><textarea id="f-commentaires" placeholder="Appréciation générale du chantier…">${d.commentaires}</textarea></div>
</div>`;}

function renderStep1List(d){
  return`<div class="card">
  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">
  ${d.corps.map(c=>{const col=sc(c.note);const ec=ECARTS.find(e=>e.value===c.ecart);
  return`<button data-corps="${c.id}" style="background:#fff;border:1px solid ${c.note!==null?col+'66':'var(--border)'};border-radius:10px;padding:13px 14px;display:flex;align-items:center;gap:10px;text-align:left;width:100%;transition:all .15s;cursor:pointer">
    <span style="font-family:var(--mono);font-size:10px;color:var(--text3);min-width:22px;font-weight:600">${c.code}</span>
    <span style="flex:1;font-size:13px;color:var(--text);font-weight:500">${c.label}</span>
    ${ec?`<span style="width:7px;height:7px;border-radius:50%;background:${ec.color};flex-shrink:0"></span>`:''}
    ${c.note!==null?`<span style="font-family:var(--mono);font-size:12px;font-weight:600;color:${col}">${c.note}/5</span>`:''}
    <span style="color:var(--text3);font-size:14px">›</span>
  </button>`;}).join('')}
  </div></div>`;}

function renderStep2Summary(d,score){
  const col=sc(score);
  const nc=d.corps.filter(c=>c.note!==null).length;
  const uc=d.corps.filter(c=>c.ecart==='urgent').length;
  const mc=d.corps.filter(c=>c.ecart==='mineur').length;
  return`
<div class="grid-2">
  <div class="card">
    <div class="section-title">Score final</div>
    <div style="display:flex;align-items:center;gap:20px;padding:10px 0">
      ${ring(score,72)}
      <div>
        <div style="font-family:var(--display);font-size:28px;font-weight:800;color:${col}">${score?score.toFixed(2):'—'}</div>
        <div style="font-size:14px;color:${col};margin-top:2px">${sl(score)}</div>
        <div style="display:flex;gap:12px;margin-top:10px">
          <div><div style="font-size:18px;font-weight:700">${nc}</div><div style="font-size:11px;color:var(--text3)">Corps notés</div></div>
          ${uc?`<div><div style="font-size:18px;font-weight:700;color:var(--red)">${uc}</div><div style="font-size:11px;color:var(--text3)">Urgents</div></div>`:''}
          ${mc?`<div><div style="font-size:18px;font-weight:700;color:var(--amber)">${mc}</div><div style="font-size:11px;color:var(--text3)">Mineurs</div></div>`:''}
        </div>
      </div>
    </div>
    ${uc?`<div style="background:rgba(184,69,61,.06);border:1px solid rgba(184,69,61,.25);border-radius:10px;padding:14px;margin-top:14px">
      <div style="font-size:10px;font-weight:700;color:var(--red);margin-bottom:8px;text-transform:uppercase;letter-spacing:1.2px">Écarts urgents</div>
      ${d.corps.filter(c=>c.ecart==='urgent').map(c=>`<div style="padding:6px 0;border-bottom:1px solid rgba(184,69,61,.15)"><span style="font-size:12px;color:var(--red);font-weight:500">${c.label}</span>${c.commentaire?`<p style="font-size:11px;color:var(--text2);margin-top:3px">${c.commentaire}</p>`:''}</div>`).join('')}
    </div>`:''}
  </div>
  <div class="card">
    <div class="section-title">Récapitulatif</div>
    ${d.commentaires?`<div style="margin-bottom:12px"><div class="form-label" style="margin-bottom:4px">Commentaires généraux</div><p style="font-size:13px;color:var(--text2);line-height:1.6">${d.commentaires}</p></div>`:''}
    <div class="form-label" style="margin-bottom:8px">Corps évalués</div>
    ${d.corps.filter(c=>c.note!==null).map(c=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
      <span style="font-family:var(--mono);font-size:10px;color:var(--text3);min-width:22px">${c.code}</span>
      <span style="flex:1;font-size:12px;color:var(--text2)">${c.label}</span>
      <span style="font-family:var(--mono);font-size:12px;font-weight:600;color:${sc(c.note)}">${c.note}/5</span>
    </div>`).join('')}
  </div>
</div>`;}

/* ── BIND MAIN ── */
function bindMain(){
  const el=id=>document.getElementById(id);
  const all=sel=>document.querySelectorAll(sel);

  // Corps editor navigation
  const bc=el('back-corps');
  if(bc){bc.addEventListener('click',()=>{
    saveCorpsTxt();ACTIVE_CORPS=null;renderMain();
  });}

  const cn=el('cancel-new');
  if(cn)cn.addEventListener('click',()=>{ACTIVE_CORPS=null;nav({page:'agence'});});

  // Rectif status selects (urgents table)
  all('.rectif-status-sel').forEach(s=>{
    s.addEventListener('change',e=>{
      const{agid,auid,cid}=e.target.dataset;
      updateRectif(+agid,+auid,+cid,'rectifStatus',e.target.value);
      s.style.background=RECTIF_STATUS.find(r=>r.value===e.target.value)?.color+'18';
      s.style.color=RECTIF_STATUS.find(r=>r.value===e.target.value)?.color;
    });
  });

  // Rectif note inputs
  all('.rectif-note-inp').forEach(inp=>{
    inp.addEventListener('change',e=>{
      const{agid,auid,cid}=e.target.dataset;
      updateRectif(+agid,+auid,+cid,'rectifNote',e.target.value);
    });
  });

  // Agence audit list
  all('[data-audit]').forEach(e=>e.addEventListener('click',()=>nav({page:'audit',auditId:+e.dataset.audit})));
  all('[data-agence]').forEach(e=>e.addEventListener('click',()=>nav({page:'agence',agenceId:+e.dataset.agence})));

  // Delete audit
  const da=el('del-audit-btn');
  if(da)da.addEventListener('click',()=>{
    if(!confirm('Supprimer cet audit ?'))return;
    const ag=STATE.agences.find(x=>x.id===VIEW.agenceId);
    ag.audits=ag.audits.filter(a=>a.id!==VIEW.auditId);
    save();nav({page:'agence'});
  });

  // New audit steps
  const ns=el('next-step');
  if(ns)ns.addEventListener('click',()=>{saveStep0Form();DRAFT.step++;renderMain();});
  const ps=el('prev-step');
  if(ps)ps.addEventListener('click',()=>{saveStep0Form();DRAFT.step--;renderMain();});
  const sv=el('save-audit');
  if(sv)sv.addEventListener('click',()=>{
    const ag=STATE.agences.find(x=>x.id===VIEW.agenceId);
    ag.audits.push(DRAFT.data);
    save();ACTIVE_CORPS=null;nav({page:'agence'});
  });

  // Corps list click
  all('[data-corps]').forEach(e=>e.addEventListener('click',()=>{ACTIVE_CORPS=+e.dataset.corps;renderMain();}));

  // Note buttons
  all('[data-note]').forEach(e=>e.addEventListener('click',()=>{
    const v=e.dataset.note==='null'?null:+e.dataset.note;
    DRAFT.data.corps=DRAFT.data.corps.map(c=>c.id===ACTIVE_CORPS?{...c,note:v}:c);
    renderMain();
  }));

  // Ecart buttons
  all('[data-ecart]').forEach(e=>e.addEventListener('click',()=>{
    const c=DRAFT.data.corps.find(x=>x.id===ACTIVE_CORPS);
    DRAFT.data.corps=DRAFT.data.corps.map(x=>x.id===ACTIVE_CORPS?{...x,ecart:x.ecart===e.dataset.ecart?null:e.dataset.ecart}:x);
    renderMain();
  }));

  // Photos
  const ap=el('add-photo'),pi=el('photo-input');
  if(ap&&pi){
    ap.addEventListener('click',()=>pi.click());
    pi.addEventListener('change',e=>{
      Array.from(e.target.files).forEach(file=>{
        const reader=new FileReader();
        reader.onload=ev=>{DRAFT.data.corps=DRAFT.data.corps.map(c=>c.id===ACTIVE_CORPS?{...c,photos:[...c.photos,ev.target.result]}:c);renderMain();};
        reader.readAsDataURL(file);
      });
    });
  }
  all('[data-dphoto]').forEach(e=>e.addEventListener('click',ev=>{
    ev.stopPropagation();const idx=+e.dataset.dphoto;
    DRAFT.data.corps=DRAFT.data.corps.map(c=>c.id===ACTIVE_CORPS?{...c,photos:c.photos.filter((_,i)=>i!==idx)}:c);renderMain();
  }));
}

function saveCorpsTxt(){
  const el=document.getElementById('corps-comment');
  if(el&&ACTIVE_CORPS!==null)DRAFT.data.corps=DRAFT.data.corps.map(c=>c.id===ACTIVE_CORPS?{...c,commentaire:el.value}:c);
}
function saveStep0Form(){
  ['date','auditeur','chantiers','participants','commentaires'].forEach(f=>{const e=document.getElementById('f-'+f);if(e)DRAFT.data[f]=e.value;});
}

/* ── MOBILE MENU ── */
function setupMobileMenu(){
  const sb=document.getElementById('sidebar');
  const bd=document.getElementById('sidebar-backdrop');
  const tg=document.getElementById('menu-toggle');
  const close=()=>{sb.classList.remove('open');bd.classList.remove('show')};
  tg.addEventListener('click',()=>{sb.classList.toggle('open');bd.classList.toggle('show')});
  bd.addEventListener('click',close);
  // Close on nav item click (mobile)
  sb.addEventListener('click',e=>{if(e.target.closest('.nav-item')&&window.innerWidth<=900)close();});
}

/* ── BOOT ── */
setupMobileMenu();
renderAll();
</script>
</body>
</html>
