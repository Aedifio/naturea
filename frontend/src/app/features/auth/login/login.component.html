<div class="login-screen">
  <div class="login-box">
    <div class="login-brand">
      <img [src]="logo.src" [alt]="logo.alt" class="login-logo" />
    </div>
    <div class="login-sub">Portail Réseau — Connexion</div>

    @if (error()) {
      <div class="login-error show">{{ error() }}</div>
    }

    <form
      class="login-form"
      [formGroup]="form"
      method="post"
      action="/login"
      (ngSubmit)="submit()"
    >
      <div class="login-field">
        <label for="email">Email</label>
        <input
          id="email"
          name="username"
          type="email"
          formControlName="email"
          autocomplete="username"
          inputmode="email"
          spellcheck="false"
          autocapitalize="none"
          placeholder="prenom.nom@naturea.fr"
        />
      </div>
      <div class="login-field">
        <label for="password">Mot de passe</label>
        <input
          id="password"
          name="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="••••••••"
        />
      </div>
      <button type="submit" class="login-btn" [disabled]="form.invalid">Se connecter</button>
    </form>
  </div>
</div>
