<div class="app-return-bar">
  <a routerLink="/home" class="banner-brand" title="alfred">
    <img [src]="logo.src" [alt]="logo.alt" class="banner-logo" />
  </a>
  <span class="bar-sep"></span>

  @if (showPortalReturn()) {
    <a
      routerLink="/home"
      routerLinkActive="on"
      [routerLinkActiveOptions]="{ exact: false }"
      class="nab a-portail return-home"
      title="Accueil"
    >
      <span class="nd">🏠</span>
      Accueil
    </a>
    <span class="bar-sep"></span>
  }

  <div class="nav-apps">
    @for (app of navApps; track app.code) {
      @if (canShow(app.code)) {
        <a
          class="nab {{ app.navClass }}"
          routerLinkActive="on"
          [routerLinkActiveOptions]="{ exact: false }"
          [routerLink]="app.route"
          [title]="permLabel(app.code)"
        >
          <span class="nd">{{ app.icon }}</span>
          {{ app.navLabel }}
        </a>
      }
    }
    @if (canShowAdmin()) {
      <a
        class="nab a-admin"
        routerLink="/admin"
        routerLinkActive="on"
        [routerLinkActiveOptions]="{ exact: false }"
        title="Administration"
      >
        <span class="nd">⚙️</span>
        Admin
      </a>
    }
  </div>

  <span class="bar-sep"></span>
  <div class="return-bar-right">
    @if (user(); as u) {
      <div class="nav-user">
        <div class="nu-text">
          <div class="nu-name">{{ u.name }}</div>
          <div class="nu-role">{{ u.role }}</div>
        </div>
        <div class="nav-av">{{ initials() }}</div>
      </div>
    }
    <button type="button" class="nav-logout" (click)="logout()">⏻ Déconnexion</button>
  </div>
</div>
